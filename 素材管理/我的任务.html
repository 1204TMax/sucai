<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的任务 - 素材管理</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#0057c2",
                        "surface": "#f5f7fa",
                        "on-surface-variant": "#414755",
                        "outline-variant": "#c1c6d7",
                        "surface-container-lowest": "#ffffff"
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Inter', 'PingFang SC', sans-serif; 
            background-color: #f5f7fa;
            padding: 8px;
        }
    </style>
</head>
<body class="text-[#1a1c1c]">
    <main class="flex flex-col gap-2">
        <!-- 头部 -->
        <section class="bg-surface-container-lowest rounded-xl p-4 shadow-sm flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold">我的任务</h1>
                <p class="text-sm text-on-surface-variant mt-1">查看合成任务的处理进度与结果</p>
            </div>
            <button onclick="history.back()" class="text-sm text-primary hover:underline">返回策略管理</button>
        </section>

        <!-- 任务列表 -->
        <section class="bg-surface-container-lowest rounded-xl shadow-sm overflow-hidden">
            <table class="w-full text-sm text-left">
                <thead class="bg-slate-50 border-b border-slate-100 text-on-surface-variant font-medium">
                    <tr>
                        <th class="px-6 py-3">任务编号 / 名称</th>
                        <th class="px-6 py-3">状态</th>
                        <th class="px-6 py-3">进度</th>
                        <th class="px-6 py-3">提交时间</th>
                        <th class="px-6 py-3 text-right">操作</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    <tr class="hover:bg-slate-50/50">
                        <td class="px-6 py-4">
                            <div class="font-bold text-slate-800">#20260418111111</div>
                            <div class="text-xs text-slate-400">享瘦XXX素材合成策略 - 自动触发</div>
                        </td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center gap-1.5 text-blue-600 bg-blue-50 px-2.5 py-0.5 rounded-full text-xs font-medium">
                                <span class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></span>
                                合成中
                            </span>
                        </td>
                        <td class="px-6 py-4">
                            <div class="w-32 bg-slate-100 rounded-full h-1.5 mt-1">
                                <div class="bg-primary h-1.5 rounded-full" style="width: 45%"></div>
                            </div>
                            <span class="text-[11px] text-slate-400 mt-1 inline-block">45/100</span>
                        </td>
                        <td class="px-6 py-4 text-slate-500">2026-04-18 10:30</td>
                        <td class="px-6 py-4 text-right">
                            <button class="text-primary hover:underline">取消任务</button>
                        </td>
                    </tr>
                    <tr class="hover:bg-slate-50/50">
                        <td class="px-6 py-4">
                            <div class="font-bold text-slate-800">#20260418109988</div>
                            <div class="text-xs text-slate-400">手动合成测试任务</div>
                        </td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center gap-1.5 text-emerald-600 bg-emerald-50 px-2.5 py-0.5 rounded-full text-xs font-medium">
                                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                                已完成
                            </span>
                        </td>
                        <td class="px-6 py-4">
                            <span class="text-slate-400 text-xs">10/10</span>
                        </td>
                        <td class="px-6 py-4 text-slate-500">2026-04-18 09:15</td>
                        <td class="px-6 py-4 text-right">
                            <button class="text-primary hover:underline">查看结果</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
