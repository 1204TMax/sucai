<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片裂变工作流 - 量化投放系统</title>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Ant Design -->
    <link rel="stylesheet" href="https://unpkg.com/antd@5.16.2/dist/reset.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
    <script src="https://unpkg.com/antd@5.16.2/dist/antd.min.js"></script>
    <!-- Ant Design Icons -->
    <script src="https://unpkg.com/@ant-design/icons@5.3.6/dist/index.umd.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                         "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #f5f7fa;
            font-size: 14px;
            color: #333;
            padding: 8px; /* 遵循文档规范 */
        }

        .page-container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            min-height: calc(100vh - 16px);
        }

        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 32px;
        }

        .form-section-title {
            font-size: 16px;
            font-weight: 500;
            color: #1a1a1a;
        }
        
        /* 定制 Dragger 样式以符合低保真原型 */
        .custom-dragger .ant-upload-drag {
            background-color: #f0f0f0 !important;
            border: none !important;
            border-radius: 8px !important;
        }
        .custom-dragger .ant-upload-drag:hover {
            background-color: #e8e8e8 !important;
        }
        .custom-dragger .ant-upload-text {
            color: #333 !important;
            font-size: 14px !important;
            margin-top: 8px !important;
        }
        .custom-dragger .anticon {
            font-size: 20px !important;
            color: #333 !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const { Input, Upload, Button, Form, message, ConfigProvider } = antd;
        const { UploadOutlined } = icons;
        const { TextArea } = Input;
        const { Dragger } = Upload;

        const App = () => {
            const [form] = Form.useForm();

            const onFinish = (values) => {
                console.log('Success:', values);
                
                // 解析 URL 参数获取来源
                const urlParams = new URLSearchParams(window.location.search);
                const fromPage = urlParams.get('from') || '通用生成';
                const fromUrl = fromPage === '工作流广场' ? 'AI 创作/工作流广场.html' : 'AI 创作/通用生成.html';

                message.success('任务已开始，您可在我的任务页中查看任务进度');
                
                // 延迟执行跳转和关闭，确保 Toast 能被看到并且正确回到原页面
                setTimeout(() => {
                    if (window.parent && window.parent !== window) {
                        // 先关闭当前标签页，这会触发默认的退回
                        window.parent.postMessage({ action: 'closeCurrentTab' }, '*');
                        // 紧接着强制打开（切换到）来源页，实现“从哪来回哪去”
                        window.parent.postMessage({ action: 'openTab', title: fromPage, url: fromUrl }, '*');
                    }
                }, 1500);
            };

            const uploadProps = {
                name: 'file',
                multiple: false,
                action: 'https://660d2bd96ddfa2943b33731c.mockapi.io/api/upload', // Mock api
                onChange(info) {
                    const { status } = info.file;
                    if (status === 'done') {
                        message.success(`${info.file.name} 上传成功`);
                    } else if (status === 'error') {
                        message.error(`${info.file.name} 上传失败`);
                    }
                },
                onDrop(e) {
                    console.log('Dropped files', e.dataTransfer.files);
                },
            };

            return (
                <ConfigProvider 
                    theme={{ 
                        token: { 
                            colorPrimary: '#4a9eff',
                            borderRadius: 6
                        } 
                    }}
                >
                    <div className="page-container">
                        <div className="page-title">图片裂变工作流</div>
                        
                        <Form 
                            form={form} 
                            layout="vertical" 
                            onFinish={onFinish}
                            initialValues={{ 
                                taskName: '图片裂变工作流-20260505'
                            }}
                        >
                            <Form.Item 
                                label={<span className="form-section-title">任务名称</span>} 
                                name="taskName"
                                rules={[{ required: true, message: '请输入任务名称' }]}
                            >
                                <Input size="large" />
                            </Form.Item>

                            <Form.Item 
                                label={<span className="form-section-title">爆款图片</span>} 
                                name="referenceImage"
                            >
                                <div className="custom-dragger">
                                    <Dragger {...uploadProps}>
                                        <p className="ant-upload-drag-icon">
                                            <UploadOutlined />
                                        </p>
                                        <p className="ant-upload-text">点击选择参考图</p>
                                    </Dragger>
                                </div>
                            </Form.Item>

                            <Form.Item 
                                label={<span className="form-section-title">裂变提示词</span>} 
                                name="prompt1"
                                rules={[{ required: true, message: '请输入裂变提示词' }]}
                            >
                                <TextArea rows={4} size="large" />
                            </Form.Item>

                            <Form.Item 
                                label={<span className="form-section-title">裂变提示词</span>} 
                                name="prompt2"
                            >
                                <TextArea rows={4} size="large" />
                            </Form.Item>

                            <Form.Item style={{ marginTop: '40px', paddingTop: '20px', borderTop: '1px solid #f0f0f0', textAlign: 'right' }}>
                                <Button size="large" onClick={() => form.resetFields()} style={{ marginRight: '16px' }}>重置</Button>
                                <Button type="primary" htmlType="submit" size="large">
                                    提交
                                </Button>
                            </Form.Item>
                        </Form>
                    </div>
                </ConfigProvider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
