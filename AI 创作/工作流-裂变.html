<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频裂变工作流 - 量化投放系统</title>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Ant Design -->
    <link rel="stylesheet" href="https://unpkg.com/antd@5.16.2/dist/reset.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
    <script src="https://unpkg.com/antd@5.16.2/dist/antd.min.js"></script>
    <!-- Ant Design Icons -->
    <script src="https://unpkg.com/@ant-design/icons@5.3.6/dist/index.umd.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                         "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #f5f7fa;
            font-size: 14px;
            color: #333;
            padding: 8px; /* 遵循文档规范 */
        }

        .page-container {
            max-width: 960px;
            margin: 0 auto;
            background: #ffffff;
            padding: 0;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            min-height: calc(100vh - 16px);
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            padding: 28px 32px 22px;
            border-bottom: 1px solid #f0f0f0;
        }

        .workflow-form {
            padding: 0;
        }

        .field-row {
            display: grid;
            grid-template-columns: 230px minmax(0, 1fr);
            gap: 28px;
            padding: 28px 32px;
            border-bottom: 1px solid #f0f0f0;
        }

        .field-meta {
            padding-top: 5px;
        }

        .field-title-line {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 8px;
        }

        .field-title {
            font-size: 16px;
            font-weight: 600;
            color: #1f1f1f;
            line-height: 1.4;
        }

        .required {
            color: #ff4d4f;
            font-size: 16px;
            line-height: 1;
        }

        .field-description {
            margin: 0;
            color: #8c8c8c;
            line-height: 1.6;
        }

        .field-control .ant-form-item {
            margin-bottom: 0;
        }

        .custom-dragger .ant-upload-drag {
            background-color: #fafafa !important;
            border-radius: 6px !important;
        }

        .custom-dragger .ant-upload-drag:hover {
            border-color: #4a9eff !important;
        }

        .custom-dragger .ant-upload-text {
            color: #333 !important;
            font-size: 15px !important;
            margin-top: 8px !important;
        }

        .custom-dragger .ant-upload-hint {
            color: #8c8c8c !important;
        }

        .upload-summary {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            color: #8c8c8c;
            font-size: 13px;
        }

        .resolution-field {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .resolution-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .resolution-control .ant-input-number {
            width: 180px;
        }

        .resolution-separator {
            color: #8c8c8c;
            font-size: 18px;
        }

        .duration-range-control {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .duration-input {
            width: 180px;
        }

        .duration-separator {
            color: #8c8c8c;
            font-size: 18px;
            line-height: 40px;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            padding: 24px 32px 32px;
        }

        .preview-media {
            display: block;
            width: 100%;
            max-height: 70vh;
            border-radius: 6px;
        }

        .preview-empty {
            margin: 0;
            padding: 24px;
            color: #8c8c8c;
            text-align: center;
        }

        @media (max-width: 720px) {
            body {
                padding: 0;
            }

            .page-container {
                min-height: 100vh;
                border-radius: 0;
            }

            .page-title {
                padding: 24px 20px 18px;
            }

            .field-row {
                grid-template-columns: 1fr;
                gap: 14px;
                padding: 24px 20px;
            }

            .resolution-control {
                align-items: stretch;
                flex-direction: column;
            }

            .resolution-control .ant-input-number,
            .duration-input {
                width: 100%;
            }

            .duration-range-control {
                align-items: stretch;
                flex-direction: column;
            }

            .duration-separator {
                display: none;
            }

            .resolution-separator {
                display: none;
            }

            .actions {
                align-items: stretch;
                flex-direction: column-reverse;
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        const { Input, Upload, Button, Form, InputNumber, Radio, Modal, message, ConfigProvider, Select, Tooltip } = antd;
        const { CheckOutlined, UploadOutlined } = icons;
        const { Dragger } = Upload;

        const CUSTOM_RESOLUTION = 'custom';
        const MAX_IMAGE_MATERIALS = 100;
        const resolutionPresets = [
            { label: '竖屏 9:16', value: 'vertical-9-16', width: 1080, height: 1920 },
            { label: '横屏 16:9', value: 'horizontal-16-9', width: 1920, height: 1080 },
            { label: '方图 1:1', value: 'square-1-1', width: 1080, height: 1080 },
            { label: '自定义', value: CUSTOM_RESOLUTION },
        ];
        const fieldSchema = [
            {
                key: 'taskName',
                title: '任务名称',
                description: '用于标识本次内容生成任务。',
                required: true,
            },
            {
                key: 'imageMaterials',
                title: '爆款图片素材',
                description: '上传图片文件作为素材来源，最多 100 个。',
                required: true,
            },
            {
                key: 'videoMaterials',
                title: '爆款视频素材',
                description: '上传视频文件作为素材来源。',
                required: false,
            },
            {
                key: 'resolution',
                title: '输出分辨率（px）',
                description: '可选择常用比例，也可手动输入图片或视频的宽度和高度。',
                required: false,
            },
            {
                key: 'durationRange',
                title: '时长范围（秒）',
                description: '填写生成视频的最小时间和最大时间，单位为秒。',
                required: false,
            },
            {
                key: 'videoStyle',
                title: '视频风格',
                description: '选择生成的视频整体风格，不同风格会带来不同的视觉体验。',
                required: false,
                type: 'text',
                control: 'select',
                options: [
                    { name: '写实风格', desc: '生成照片级别的真实质感' },
                    { name: '二次元', desc: '日系动漫插画风格' },
                    { name: '3D 渲染', desc: '立体细腻的 3D 模型效果' }
                ]
            }
        ];
        const fieldMeta = Object.fromEntries(fieldSchema.map(field => [field.key, field]));

        const normalizeFileList = event => {
            if (Array.isArray(event)) {
                return event;
            }
            return event?.fileList || [];
        };

        const getRawFile = file => file.originFileObj || file;

        const getMediaType = file => {
            const rawFile = getRawFile(file);
            const type = (file.type || rawFile.type || '').toLowerCase();
            const name = (file.name || '').toLowerCase();

            if (type.startsWith('image/') || /\.(avif|bmp|gif|jpe?g|png|svg|webp)$/.test(name)) {
                return 'image';
            }

            if (type.startsWith('video/') || /\.(avi|m4v|mkv|mov|mp4|mpeg|ogg|webm)$/.test(name)) {
                return 'video';
            }

            return '';
        };

        const formatFiles = files => (files || []).map(file => ({
            name: file.name,
            size: file.size,
            type: file.type || getRawFile(file).type || '',
        }));

        const App = () => {
            const [form] = Form.useForm();
            const [imageFiles, setImageFiles] = useState([]);
            const [videoFiles, setVideoFiles] = useState([]);
            const [resolutionPreset, setResolutionPreset] = useState(CUSTOM_RESOLUTION);
            const [preview, setPreview] = useState({ open: false, title: '', url: '', type: '' });

            const handlePaste = useCallback((e) => {
                const clipboardFiles = e.clipboardData?.files;
                if (!clipboardFiles || clipboardFiles.length === 0) return;

                const newImages = [];
                const newVideos = [];

                Array.from(clipboardFiles).forEach(file => {
                    const mediaType = getMediaType(file);
                    if (!mediaType) return;

                    const rcFile = {
                        uid: `rc-upload-paste-${Date.now()}-${Math.random().toString(36).slice(2)}`,
                        name: file.name,
                        type: file.type,
                        size: file.size,
                        originFileObj: file,
                        status: 'done'
                    };

                    if (mediaType === 'image') {
                        newImages.push(rcFile);
                    } else if (mediaType === 'video') {
                        newVideos.push(rcFile);
                    }
                });

                if (newImages.length === 0 && newVideos.length === 0) {
                    return;
                }

                e.preventDefault();

                if (newImages.length > 0) {
                    const combinedImages = [...imageFiles, ...newImages].slice(0, MAX_IMAGE_MATERIALS);
                    setImageFiles(combinedImages);
                    form.setFieldsValue({ imageMaterials: combinedImages });
                }

                if (newVideos.length > 0) {
                    const combinedVideos = [...videoFiles, ...newVideos];
                    setVideoFiles(combinedVideos);
                    form.setFieldsValue({ videoMaterials: combinedVideos });
                }

                message.success(`成功从剪贴板粘贴添加 ${newImages.length + newVideos.length} 个文件`);
            }, [imageFiles, videoFiles, form]);

            useEffect(() => {
                document.addEventListener('paste', handlePaste);
                return () => {
                    document.removeEventListener('paste', handlePaste);
                };
            }, [handlePaste]);

            const onFinish = (values) => {
                const payload = {
                    ...values,
                    imageMaterials: formatFiles(values.imageMaterials),
                    videoMaterials: formatFiles(values.videoMaterials),
                };
                console.log('Success:', payload);
                
                // 解析 URL 参数获取来源
                const urlParams = new URLSearchParams(window.location.search);
                const fromPage = urlParams.get('from') || '通用生成';
                const fromUrl = fromPage === '工作流广场' ? 'AI 创作/工作流广场.html' : 'AI 创作/通用生成.html';

                message.success('任务已开始，您可在我的任务页中查看任务进度');
                
                // 延迟执行跳转和关闭，确保 Toast 能被看到并且正确回到原页面
                setTimeout(() => {
                    if (window.parent && window.parent !== window) {
                        // 先关闭当前标签页，这会触发默认的退回
                        window.parent.postMessage({ action: 'closeCurrentTab' }, '*');
                        // 紧接着强制打开（切换到）来源页，实现“从哪来回哪去”
                        window.parent.postMessage({ action: 'openTab', title: fromPage, url: fromUrl }, '*');
                    }
                }, 1500);
            };

            const beforeUpload = (file, mediaType, maxCount) => {
                if (getMediaType(file) !== mediaType) {
                    message.error(`${file.name} 文件类型不符合要求`);
                    return Upload.LIST_IGNORE;
                }

                const currentFiles = mediaType === 'image' ? imageFiles : videoFiles;
                if (maxCount && currentFiles.length >= maxCount) {
                    message.warning(`最多上传 ${maxCount} 个文件`);
                    return Upload.LIST_IGNORE;
                }

                return false;
            };

            const handleUploadChange = (info, mediaType, maxCount) => {
                const nextFiles = info.fileList
                    .filter(file => getMediaType(file) === mediaType)
                    .slice(0, maxCount || info.fileList.length)
                    .map(file => ({ ...file, status: 'done' }));

                if (mediaType === 'image') {
                    setImageFiles(nextFiles);
                    form.setFieldsValue({ imageMaterials: nextFiles });
                } else {
                    setVideoFiles(nextFiles);
                    form.setFieldsValue({ videoMaterials: nextFiles });
                }
            };

            const handlePreview = async file => {
                const mediaType = getMediaType(file);
                if (!mediaType) {
                    message.warning('当前文件暂不支持预览');
                    return;
                }

                const rawFile = getRawFile(file);
                const url = file.url || file.thumbUrl || URL.createObjectURL(rawFile);
                setPreview({
                    open: true,
                    title: file.name || '素材预览',
                    url,
                    type: mediaType,
                });
            };

            const handleResolutionPresetChange = event => {
                const value = event.target.value;
                setResolutionPreset(value);

                const preset = resolutionPresets.find(item => item.value === value);
                if (preset && preset.value !== CUSTOM_RESOLUTION) {
                    form.setFieldsValue({
                        resolutionWidth: preset.width,
                        resolutionHeight: preset.height,
                    });
                }
            };

            const markCustomResolution = () => {
                setResolutionPreset(CUSTOM_RESOLUTION);
                form.setFieldsValue({ resolutionPreset: CUSTOM_RESOLUTION });
            };

            const resetForm = () => {
                form.resetFields();
                setImageFiles([]);
                setVideoFiles([]);
                setResolutionPreset(CUSTOM_RESOLUTION);
                form.setFieldsValue({
                    imageMaterials: [],
                    videoMaterials: [],
                    resolutionPreset: CUSTOM_RESOLUTION,
                    resolutionWidth: null,
                    resolutionHeight: null,
                    durationMinSeconds: null,
                    durationMaxSeconds: null,
                    videoStyle: '写实风格',
                });
            };

            return (
                <ConfigProvider 
                    theme={{ 
                        token: { 
                            colorPrimary: '#4a9eff',
                            borderRadius: 6
                        } 
                    }}
                >
                    <div className="page-container">
                        <div className="page-title">视频裂变工作流</div>
                        
                        <Form 
                            form={form} 
                            layout="vertical" 
                            onFinish={onFinish}
                            className="workflow-form"
                            initialValues={{ 
                                taskName: '',
                                imageMaterials: [],
                                videoMaterials: [],
                                resolutionPreset: CUSTOM_RESOLUTION,
                                resolutionWidth: null,
                                resolutionHeight: null,
                                durationMinSeconds: null,
                                durationMaxSeconds: null,
                                videoStyle: '写实风格',
                            }}
                        >
                            <div className="field-row">
                                <div className="field-meta">
                                    <div className="field-title-line">
                                        <span className="field-title">{fieldMeta.taskName.title}</span>
                                        <span className="required">*</span>
                                    </div>
                                    <p className="field-description">{fieldMeta.taskName.description}</p>
                                </div>
                                <div className="field-control">
                                    <Form.Item name="taskName" rules={[{ required: true, message: '请输入任务名称' }]}>
                                        <Input size="large" placeholder="请输入任务名称" allowClear />
                                    </Form.Item>
                                </div>
                            </div>

                            <div className="field-row">
                                <div className="field-meta">
                                    <div className="field-title-line">
                                        <span className="field-title">{fieldMeta.imageMaterials.title}</span>
                                        <span className="required">*</span>
                                    </div>
                                    <p className="field-description">{fieldMeta.imageMaterials.description}</p>
                                </div>
                                <div className="field-control">
                                    <Form.Item
                                        name="imageMaterials"
                                        valuePropName="fileList"
                                        getValueFromEvent={normalizeFileList}
                                        rules={[{
                                            validator: (_, value) => value?.length ? Promise.resolve() : Promise.reject(new Error('请上传至少 1 个爆款图片素材')),
                                        }]}
                                    >
                                        <Dragger
                                            className="custom-dragger"
                                            accept="image/*"
                                            multiple
                                            maxCount={MAX_IMAGE_MATERIALS}
                                            fileList={imageFiles}
                                            beforeUpload={file => beforeUpload(file, 'image', MAX_IMAGE_MATERIALS)}
                                            onChange={info => handleUploadChange(info, 'image', MAX_IMAGE_MATERIALS)}
                                            onPreview={handlePreview}
                                        >
                                            <p className="ant-upload-drag-icon"><UploadOutlined /></p>
                                            <p className="ant-upload-text">点击或拖拽上传图片素材</p>
                                            <p className="ant-upload-hint">支持 JPG、PNG、WEBP、GIF 等图片文件，上传后可预览。</p>
                                        </Dragger>
                                    </Form.Item>
                                    <div className="upload-summary">
                                        <span>已选择 {imageFiles.length} 个文件</span>
                                        <span>最多 {MAX_IMAGE_MATERIALS} 个</span>
                                    </div>
                                </div>
                            </div>

                            <div className="field-row">
                                <div className="field-meta">
                                    <div className="field-title-line">
                                        <span className="field-title">{fieldMeta.videoMaterials.title}</span>
                                    </div>
                                    <p className="field-description">{fieldMeta.videoMaterials.description}</p>
                                </div>
                                <div className="field-control">
                                    <Form.Item name="videoMaterials" valuePropName="fileList" getValueFromEvent={normalizeFileList}>
                                        <Dragger
                                            className="custom-dragger"
                                            accept="video/*"
                                            multiple
                                            fileList={videoFiles}
                                            beforeUpload={file => beforeUpload(file, 'video')}
                                            onChange={info => handleUploadChange(info, 'video')}
                                            onPreview={handlePreview}
                                        >
                                            <p className="ant-upload-drag-icon"><UploadOutlined /></p>
                                            <p className="ant-upload-text">点击或拖拽上传视频素材</p>
                                            <p className="ant-upload-hint">支持 MP4、MOV、WEBM 等视频文件，上传后可预览。</p>
                                        </Dragger>
                                    </Form.Item>
                                    <div className="upload-summary">
                                        <span>已选择 {videoFiles.length} 个文件</span>
                                    </div>
                                </div>
                            </div>

                            <div className="field-row">
                                <div className="field-meta">
                                    <div className="field-title-line">
                                        <span className="field-title">{fieldMeta.resolution.title}</span>
                                    </div>
                                    <p className="field-description">{fieldMeta.resolution.description}</p>
                                </div>
                                <div className="field-control">
                                    <div className="resolution-field">
                                        <Form.Item name="resolutionPreset">
                                            <Radio.Group
                                                optionType="button"
                                                buttonStyle="solid"
                                                value={resolutionPreset}
                                                onChange={handleResolutionPresetChange}
                                            >
                                                {resolutionPresets.map(preset => (
                                                    <Radio.Button key={preset.value} value={preset.value}>{preset.label}</Radio.Button>
                                                ))}
                                            </Radio.Group>
                                        </Form.Item>
                                        <div className="resolution-control">
                                            <Form.Item name="resolutionWidth">
                                                <InputNumber
                                                    size="large"
                                                    min={1}
                                                    precision={0}
                                                    placeholder="宽度"
                                                    addonAfter="px"
                                                    onChange={markCustomResolution}
                                                />
                                            </Form.Item>
                                            <span className="resolution-separator">×</span>
                                            <Form.Item name="resolutionHeight">
                                                <InputNumber
                                                    size="large"
                                                    min={1}
                                                    precision={0}
                                                    placeholder="高度"
                                                    addonAfter="px"
                                                    onChange={markCustomResolution}
                                                />
                                            </Form.Item>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="field-row">
                                <div className="field-meta">
                                    <div className="field-title-line">
                                        <span className="field-title">{fieldMeta.durationRange.title}</span>
                                    </div>
                                    <p className="field-description">{fieldMeta.durationRange.description}</p>
                                </div>
                                <div className="field-control">
                                    <div className="duration-range-control">
                                        <Form.Item name="durationMinSeconds">
                                            <InputNumber
                                                size="large"
                                                min={0}
                                                precision={0}
                                                placeholder="最小时间"
                                                addonAfter="秒"
                                                className="duration-input"
                                            />
                                        </Form.Item>
                                        <span className="duration-separator">-</span>
                                        <Form.Item
                                            name="durationMaxSeconds"
                                            dependencies={['durationMinSeconds']}
                                            rules={[({ getFieldValue }) => ({
                                                validator(_, value) {
                                                    const min = getFieldValue('durationMinSeconds');
                                                    if (value == null || min == null || value >= min) {
                                                        return Promise.resolve();
                                                    }
                                                    return Promise.reject(new Error('最大时间需大于或等于最小时间'));
                                                },
                                            })]}
                                        >
                                            <InputNumber
                                                size="large"
                                                min={0}
                                                precision={0}
                                                placeholder="最大时间"
                                                addonAfter="秒"
                                                className="duration-input"
                                            />
                                        </Form.Item>
                                    </div>
                                </div>
                            </div>

                            <div className="field-row">
                                <div className="field-meta">
                                    <div className="field-title-line">
                                        <span className="field-title">{fieldMeta.videoStyle.title}</span>
                                    </div>
                                    <p className="field-description">{fieldMeta.videoStyle.description}</p>
                                </div>
                                <div className="field-control">
                                    <Form.Item name="videoStyle">
                                        {fieldMeta.videoStyle.control === 'select' ? (
                                            <Select
                                                size="large"
                                                style={{ width: 220 }}
                                                dropdownStyle={{ width: 280 }}
                                                optionLabelProp="label"
                                            >
                                                {fieldMeta.videoStyle.options.map(opt => (
                                                    <Select.Option key={opt.name} value={opt.name} label={opt.name}>
                                                        <Tooltip title={opt.desc} placement="right" mouseEnterDelay={0.3}>
                                                            <div style={{ display: 'flex', flexDirection: 'column', gap: '2px', padding: '4px 0' }}>
                                                                <span style={{ fontSize: '14px', color: 'var(--text-hi)', lineHeight: '1.2' }}>{opt.name}</span>
                                                                {opt.desc && (
                                                                    <span style={{ fontSize: '12px', color: 'var(--text-muted)', lineHeight: '1.4', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                                                                        {opt.desc}
                                                                    </span>
                                                                )}
                                                            </div>
                                                        </Tooltip>
                                                    </Select.Option>
                                                ))}
                                            </Select>
                                        ) : (
                                            <Input size="large" placeholder={`请输入${fieldMeta.videoStyle.title}`} />
                                        )}
                                    </Form.Item>
                                </div>
                            </div>

                            <div className="actions">
                                <Button size="large" onClick={resetForm}>取消</Button>
                                <Button type="primary" htmlType="submit" size="large" icon={<CheckOutlined />}>
                                    提交表单
                                </Button>
                            </div>
                        </Form>
                    </div>
                    <Modal
                        open={preview.open}
                        title={preview.title}
                        footer={null}
                        width={720}
                        destroyOnClose
                        onCancel={() => setPreview({ open: false, title: '', url: '', type: '' })}
                    >
                        {preview.type === 'image' && <img src={preview.url} alt={preview.title} className="preview-media" />}
                        {preview.type === 'video' && <video src={preview.url} className="preview-media" controls />}
                        {!preview.type && <p className="preview-empty">当前文件暂不支持预览</p>}
                    </Modal>
                </ConfigProvider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
