<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原料库 - 量化投放系统</title>
    <style>
        :root {
            --ant-primary-1: #E6F4FF;
            --ant-primary-2: #BAE0FF;
            --ant-primary-5: #4096FF;
            --ant-primary-6: #1677FF;
            --ant-primary-7: #0958D9;
            --ant-success-1: #F6FFED;
            --ant-success-2: #D9F7BE;
            --ant-success-6: #52C41A;
            --ant-warning-1: #FFFBE6;
            --ant-warning-2: #FFF1B8;
            --ant-warning-6: #FAAD14;
            --ant-error-1: #FFF1F0;
            --ant-error-2: #FFCCC7;
            --ant-error-6: #F5222D;
            --ant-text-color: #262626;
            --ant-text-color-secondary: #595959;
            --ant-text-color-tertiary: #8C8C8C;
            --ant-text-color-inverse: #FFFFFF;
            --ant-bg-base: #F5F5F5;
            --ant-bg-container: #FFFFFF;
            --ant-bg-secondary: rgba(0,0,0,0.02);
            --ant-bg-tertiary: rgba(0,0,0,0.04);
            --ant-border-color: #D9D9D9;
            --ant-border-color-secondary: #F0F0F0;
            --ant-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
            --ant-font-size-h4: 20px;
            --ant-font-size-h5: 16px;
            --ant-font-size: 14px;
            --ant-font-size-sm: 12px;
            --ant-size-xxs: 4px;
            --ant-size-xs: 8px;
            --ant-size-sm: 12px;
            --ant-size: 16px;
            --ant-size-md: 20px;
            --ant-size-lg: 24px;
            --ant-border-radius-sm: 4px;
            --ant-border-radius: 6px;
            --ant-border-radius-lg: 8px;
            --ant-box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            --ant-box-shadow-focus: 0 0 0 2px rgba(22,119,255,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: calc(100vh - 4px);
            overflow: hidden;
            padding: var(--ant-size-xs);
            background: var(--ant-bg-base);
            color: var(--ant-text-color);
            font-family: var(--ant-font-family);
            font-size: var(--ant-font-size);
        }

        button,
        input,
        select {
            font: inherit;
        }

        button {
            border: none;
        }

        svg {
            width: 1em;
            height: 1em;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .page {
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: var(--ant-size-xs);
            min-height: 0;
        }

        .surface {
            background: var(--ant-bg-container);
            border: 1px solid var(--ant-border-color-secondary);
            border-radius: var(--ant-border-radius-lg);
            box-shadow: var(--ant-box-shadow);
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--ant-size);
            padding: var(--ant-size) var(--ant-size-lg);
            flex-shrink: 0;
        }

        .title-wrap {
            min-width: 0;
        }

        .page-title {
            font-size: var(--ant-font-size-h4);
            font-weight: 600;
            line-height: 1.4;
        }

        .page-desc {
            margin-top: var(--ant-size-xxs);
            color: var(--ant-text-color-secondary);
            font-size: var(--ant-font-size-sm);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn {
            height: 32px;
            padding: 0 var(--ant-size);
            border-radius: var(--ant-border-radius);
            border: 1px solid var(--ant-border-color);
            background: var(--ant-bg-container);
            color: var(--ant-text-color);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--ant-size-xs);
            cursor: pointer;
            white-space: nowrap;
            transition: color 120ms ease, border-color 120ms ease, background 120ms ease;
        }

        .btn:hover {
            border-color: var(--ant-primary-5);
            color: var(--ant-primary-6);
        }

        .btn-primary {
            background: var(--ant-primary-6);
            border-color: var(--ant-primary-6);
            color: var(--ant-text-color-inverse);
        }

        .btn-primary:hover {
            background: var(--ant-primary-5);
            border-color: var(--ant-primary-5);
            color: var(--ant-text-color-inverse);
        }

        .btn-small {
            height: 28px;
            padding: 0 var(--ant-size-sm);
            font-size: var(--ant-font-size-sm);
        }

        .layout {
            flex: 1;
            display: grid;
            grid-template-columns: 252px minmax(0, 1fr);
            gap: var(--ant-size-xs);
            min-height: 0;
        }

        .folder-panel,
        .main-panel {
            min-height: 0;
            overflow: hidden;
        }

        .folder-panel {
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            padding: var(--ant-size-sm) var(--ant-size);
            border-bottom: 1px solid var(--ant-border-color-secondary);
            font-size: var(--ant-font-size-h5);
            font-weight: 600;
        }

        .folder-search,
        .toolbar {
            padding: var(--ant-size-sm) var(--ant-size);
            border-bottom: 1px solid var(--ant-border-color-secondary);
        }

        .input,
        .select {
            height: 32px;
            border: 1px solid var(--ant-border-color);
            border-radius: var(--ant-border-radius);
            background: var(--ant-bg-container);
            color: var(--ant-text-color);
            outline: none;
        }

        .input {
            width: 100%;
            padding: 0 var(--ant-size-sm);
        }

        .select {
            min-width: 120px;
            padding: 0 var(--ant-size-sm);
        }

        .input:focus,
        .select:focus {
            border-color: var(--ant-primary-6);
            box-shadow: var(--ant-box-shadow-focus);
        }

        .tree {
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding: var(--ant-size-xs);
        }

        .tree-label {
            padding: var(--ant-size-xs) var(--ant-size-xs) var(--ant-size-xxs);
            color: var(--ant-text-color-tertiary);
            font-size: var(--ant-font-size-sm);
        }

        .tree-node {
            display: grid;
            grid-template-columns: 18px minmax(0, 1fr) auto;
            gap: var(--ant-size-xs);
            align-items: center;
            min-height: 34px;
            padding: var(--ant-size-xs) var(--ant-size-sm);
            border-radius: var(--ant-border-radius);
            color: var(--ant-text-color-secondary);
            cursor: pointer;
            transition: background 120ms ease, color 120ms ease;
        }

        .tree-node:hover {
            background: var(--ant-bg-secondary);
            color: var(--ant-primary-6);
        }

        .tree-node.active {
            background: var(--ant-primary-1);
            color: var(--ant-primary-7);
            font-weight: 600;
        }

        .tree-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tree-count {
            color: var(--ant-text-color-tertiary);
            font-size: var(--ant-font-size-sm);
            font-weight: 400;
        }

        .tree-children {
            margin-left: var(--ant-size-md);
            padding-left: var(--ant-size-xs);
            border-left: 1px solid var(--ant-border-color-secondary);
        }

        .main-panel {
            display: flex;
            flex-direction: column;
        }

        .stage-tabs {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: var(--ant-size-xs);
            padding: var(--ant-size);
            border-bottom: 1px solid var(--ant-border-color-secondary);
            flex-shrink: 0;
        }

        .stage-tab {
            min-height: 64px;
            padding: var(--ant-size-sm);
            border-radius: var(--ant-border-radius-lg);
            border: 1px solid var(--ant-border-color-secondary);
            background: var(--ant-bg-container);
            color: var(--ant-text-color-secondary);
            text-align: left;
            cursor: pointer;
            transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
        }

        .stage-tab:hover {
            border-color: var(--ant-primary-2);
            color: var(--ant-primary-6);
        }

        .stage-tab.active {
            background: var(--ant-primary-1);
            border-color: var(--ant-primary-2);
            color: var(--ant-primary-7);
        }

        .stage-name {
            display: flex;
            align-items: center;
            gap: var(--ant-size-xs);
            font-weight: 600;
            color: var(--ant-text-color);
        }

        .stage-tab.active .stage-name {
            color: var(--ant-primary-7);
        }

        .stage-desc {
            margin-top: var(--ant-size-xxs);
            font-size: var(--ant-font-size-sm);
            color: var(--ant-text-color-tertiary);
            line-height: 1.45;
        }

        .context-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--ant-size);
            padding: var(--ant-size-sm) var(--ant-size);
            border-bottom: 1px solid var(--ant-border-color-secondary);
            background: var(--ant-bg-secondary);
            flex-shrink: 0;
        }

        .context-title {
            font-weight: 600;
        }

        .context-meta {
            margin-left: var(--ant-size-xs);
            color: var(--ant-text-color-tertiary);
            font-size: var(--ant-font-size-sm);
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--ant-size-sm);
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .toolbar-left,
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: var(--ant-size-xs);
            flex-wrap: wrap;
            min-width: 0;
        }

        .type-tabs {
            display: none;
            align-items: center;
            gap: var(--ant-size-xxs);
            flex-wrap: wrap;
        }

        .type-tabs.show {
            display: flex;
        }

        .type-tab {
            height: 28px;
            padding: 0 var(--ant-size-sm);
            border-radius: var(--ant-border-radius);
            background: transparent;
            color: var(--ant-text-color-secondary);
            cursor: pointer;
        }

        .type-tab.active {
            background: var(--ant-primary-1);
            color: var(--ant-primary-7);
            font-weight: 600;
        }

        .content {
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding: var(--ant-size);
        }

        .stage-note {
            display: flex;
            align-items: flex-start;
            gap: var(--ant-size-xs);
            padding: var(--ant-size-sm) var(--ant-size);
            margin-bottom: var(--ant-size);
            border: 1px solid var(--ant-primary-2);
            border-radius: var(--ant-border-radius-lg);
            background: var(--ant-primary-1);
            color: var(--ant-text-color-secondary);
            line-height: 1.7;
        }

        .stage-note strong {
            color: var(--ant-primary-7);
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: var(--ant-size-sm);
        }

        .row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: var(--ant-size);
            align-items: center;
            padding: var(--ant-size);
            border: 1px solid var(--ant-border-color-secondary);
            border-radius: var(--ant-border-radius-lg);
            background: var(--ant-bg-container);
        }

        .row-main {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: var(--ant-size-sm);
            min-width: 0;
        }

        .thumb,
        .icon-thumb {
            width: 76px;
            height: 76px;
            border-radius: var(--ant-border-radius);
            background: var(--ant-bg-tertiary);
            overflow: hidden;
            flex-shrink: 0;
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .icon-thumb {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ant-primary-7);
            background: var(--ant-primary-1);
            font-size: 28px;
        }

        .role-views {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--ant-size-xxs);
            width: 126px;
            height: 76px;
        }

        .role-view {
            position: relative;
            overflow: hidden;
            border-radius: var(--ant-border-radius-sm);
            background: var(--ant-bg-tertiary);
        }

        .role-view img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .view-label {
            position: absolute;
            left: 2px;
            bottom: 2px;
            padding: 1px 4px;
            border-radius: var(--ant-border-radius-sm);
            background: rgba(0,0,0,0.62);
            color: var(--ant-text-color-inverse);
            font-size: 10px;
        }

        .row-title {
            display: flex;
            align-items: center;
            gap: var(--ant-size-xs);
            min-width: 0;
            font-weight: 600;
            color: var(--ant-text-color);
        }

        .row-title-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .row-desc {
            margin-top: var(--ant-size-xs);
            color: var(--ant-text-color-secondary);
            line-height: 1.65;
        }

        .row-meta {
            display: flex;
            align-items: center;
            gap: var(--ant-size-xs);
            flex-wrap: wrap;
            margin-top: var(--ant-size-xs);
            color: var(--ant-text-color-tertiary);
            font-size: var(--ant-font-size-sm);
        }

        .row-actions {
            display: flex;
            align-items: center;
            gap: var(--ant-size-xs);
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            height: 24px;
            padding: 0 var(--ant-size-xs);
            border-radius: var(--ant-border-radius-sm);
            border: 1px solid var(--ant-border-color-secondary);
            background: var(--ant-bg-secondary);
            color: var(--ant-text-color-secondary);
            font-size: var(--ant-font-size-sm);
            white-space: nowrap;
        }

        .tag-primary {
            background: var(--ant-primary-1);
            border-color: var(--ant-primary-2);
            color: var(--ant-primary-7);
        }

        .tag-success {
            background: var(--ant-success-1);
            border-color: var(--ant-success-2);
            color: var(--ant-success-6);
        }

        .tag-warning {
            background: var(--ant-warning-1);
            border-color: var(--ant-warning-2);
            color: var(--ant-warning-6);
        }

        .tag-error {
            background: var(--ant-error-1);
            border-color: var(--ant-error-2);
            color: var(--ant-error-6);
        }

        .copy-preview {
            padding: var(--ant-size-sm);
            border-radius: var(--ant-border-radius);
            background: var(--ant-bg-secondary);
            color: var(--ant-text-color-secondary);
            line-height: 1.7;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(96px, 1fr));
            gap: var(--ant-size-xs);
            margin-top: var(--ant-size-xs);
        }

        .metric {
            padding: var(--ant-size-xs);
            border-radius: var(--ant-border-radius);
            background: var(--ant-bg-secondary);
        }

        .metric-value {
            font-weight: 600;
            color: var(--ant-text-color);
        }

        .metric-label {
            margin-top: 2px;
            color: var(--ant-text-color-tertiary);
            font-size: var(--ant-font-size-sm);
        }

        .empty {
            display: none;
            min-height: 260px;
            align-items: center;
            justify-content: center;
            border: 1px dashed var(--ant-border-color);
            border-radius: var(--ant-border-radius-lg);
            color: var(--ant-text-color-tertiary);
            background: var(--ant-bg-secondary);
        }

        .toast {
            position: fixed;
            right: var(--ant-size-lg);
            bottom: var(--ant-size-lg);
            z-index: 20;
            display: none;
            padding: var(--ant-size-sm) var(--ant-size);
            border-radius: var(--ant-border-radius-lg);
            background: var(--ant-text-color);
            color: var(--ant-text-color-inverse);
            box-shadow: var(--ant-box-shadow);
            font-size: var(--ant-font-size-sm);
        }

        .toast.show {
            display: block;
        }

        @media (max-width: 1020px) {
            body {
                height: auto;
                min-height: 100vh;
                overflow: auto;
            }

            .page {
                height: auto;
            }

            .layout,
            .stage-tabs {
                grid-template-columns: 1fr;
            }

            .folder-panel,
            .main-panel {
                min-height: 360px;
            }

            .row {
                grid-template-columns: 1fr;
            }

            .row-actions {
                justify-content: flex-start;
            }

            .metric-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="page-header surface">
            <div class="title-wrap">
                <h1 class="page-title">原料库</h1>
                <p class="page-desc">按生产、存储、使用、数据反馈四个场景管理工作流可复用原料。</p>
            </div>
            <div class="row-actions">
                <button class="btn" data-action="新建文件夹">
                    <svg viewBox="0 0 24 24"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
                    新建文件夹
                </button>
                <button class="btn btn-primary" data-action="导入原料">
                    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M7 10l5-5 5 5"></path><path d="M12 5v12"></path></svg>
                    导入原料
                </button>
            </div>
        </header>

        <main class="layout">
            <aside class="folder-panel surface">
                <div class="panel-title">业务文件夹</div>
                <div class="folder-search">
                    <input id="folderSearch" class="input" type="search" placeholder="搜索文件夹">
                </div>
                <div class="tree" id="folderTree">
                    <div class="tree-label">系统视图</div>
                    <div class="tree-node active" data-name="全部原料" data-meta="全部业务文件夹 · 全部原料" data-folder="全部">
                        <svg viewBox="0 0 24 24"><path d="M3 6h18"></path><path d="M3 12h18"></path><path d="M3 18h18"></path></svg>
                        <span class="tree-name">全部原料</span>
                        <span class="tree-count">1286</span>
                    </div>
                    <div class="tree-node" data-name="待入库" data-meta="生产后待确认入库的脚本和演员" data-folder="待入库">
                        <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg>
                        <span class="tree-name">待入库</span>
                        <span class="tree-count">31</span>
                    </div>
                    <div class="tree-node" data-name="最近使用" data-meta="最近 7 天被下载或工作流引用" data-folder="最近使用">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>
                        <span class="tree-name">最近使用</span>
                        <span class="tree-count">76</span>
                    </div>
                    <div class="tree-node" data-name="未归类" data-meta="尚未放入业务文件夹的原料" data-folder="未归类">
                        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M7 10l5-5 5 5"></path><path d="M12 5v12"></path></svg>
                        <span class="tree-name">未归类</span>
                        <span class="tree-count">18</span>
                    </div>

                    <div class="tree-label">业务分类</div>
                    <div class="tree-node" data-name="IAA" data-meta="广告变现业务 · 用户创建的一级文件夹" data-folder="IAA">
                        <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                        <span class="tree-name">IAA</span>
                        <span class="tree-count">618</span>
                    </div>
                    <div class="tree-children">
                        <div class="tree-node" data-name="IAA / 步数赚金币" data-meta="步数、打卡、金币激励类脚本和演员" data-folder="IAA / 步数赚金币">
                            <svg viewBox="0 0 24 24"><path d="M3 3v18h18"></path><path d="M7 14l4-4 4 3 5-7"></path></svg>
                            <span class="tree-name">步数赚金币</span>
                            <span class="tree-count">164</span>
                        </div>
                        <div class="tree-node" data-name="IAA / 清理加速" data-meta="清理、加速、省电、安全工具类原料" data-folder="IAA / 清理加速">
                            <svg viewBox="0 0 24 24"><path d="M12 2v20"></path><path d="M5 7h14"></path><path d="M7 12h10"></path><path d="M9 17h6"></path></svg>
                            <span class="tree-name">清理加速</span>
                            <span class="tree-count">132</span>
                        </div>
                        <div class="tree-node" data-name="IAA / 网赚工具" data-meta="网赚、任务、提现相关原料" data-folder="IAA / 网赚工具">
                            <svg viewBox="0 0 24 24"><path d="M12 1v22"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                            <span class="tree-name">网赚工具</span>
                            <span class="tree-count">98</span>

        function escapeHtml(text) {
            return String(text || '').replace(/[&<>"']/g, function(match) {

            });
        }

        function statusTag(status) {
            if (status === '可用') return '<span class="tag tag-success">可用</span>';
            if (status === '需复核') return '<span class="tag tag-warning">需复核</span>';
            return '<span class="tag tag-primary">待处理</span>';
        }

        function renderThumb(row) {
            if (row.views) {
                const labels = ['正面', '侧面', '背面'];
                return '<div class="role-views">' + row.views.map(function(src, index) {
                    return '<div class="role-view"><img src="' + src + '" alt="' + escapeHtml(row.title + labels[index]) + '"><span class="view-label">' + labels[index] + '</span></div>';
                }).join('') + '</div>';
            }
            if (row.image) {
                return '<div class="thumb"><img src="' + row.image + '" alt="' + escapeHtml(row.title) + '"></div>';
            }
            return '<div class="icon-thumb">' + (row.type === '脚本' ? iconMap.copy : row.type === '演员' ? iconMap.role : iconMap.voice) + '</div>';
        }

        function renderMetrics(row) {
            if (!row.metrics) return '';

        function renderRow(row) {
            const copy = row.copy ? '<div class="copy-preview">' + escapeHtml(row.copy) + '</div>' : '';

                return '<span>' + escapeHtml(item) + '</span>';
            }).join('<span>·</span>');

            return '<article class="row">'

                        + '<div class="row-title"><span class="row-title-text">' + escapeHtml(row.title) + '</span>' + statusTag(row.status) + '<span class="tag tag-primary">' + escapeHtml(row.type) + '</span></div>'

                + '</div>'
            + '</article>';

                const folderMatched = currentFolder === '全部'
                    || (currentFolder === '待入库' && row.status === '待处理')
                    || (currentFolder === '最近使用' && row.recent)
                    || (currentFolder === '未归类' && folder === '未归类')
                    || folder === currentFolder
                    || folder.indexOf(currentFolder + ' /') === 0;
                return (currentStage !== 'storage' || currentType === '全部' || row.type === currentType)
                    && folderMatched
                    && (status === '全部' || row.status === status)
                    && (!keyword || text.includes(keyword));
            });
        }

                return;

                btn.addEventListener('click', function() {
                    showToast(btn.dataset.action);
                });
            });
        }

            const toast = document.getElementById('toast');

        document.querySelectorAll('[data-action]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                showToast(btn.dataset.action);
            });
        });

        document.querySelectorAll('.stage-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.stage-tab').forEach(function(item) {
                    item.classList.remove('active');
                });
                tab.classList.add('active');
                currentStage = tab.dataset.stage;
                render();
            });
        });

        document.querySelectorAll('.type-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.type-tab').forEach(function(item) {
                    item.classList.remove('active');
                });
                tab.classList.add('active');
                currentType = tab.dataset.type;
                render();
            });
        });

        document.querySelectorAll('#keyword, #statusFilter').forEach(function(control) {
            control.addEventListener('input', render);
            control.addEventListener('change', render);
        });

        document.getElementById('resetBtn').addEventListener('click', function() {
            document.getElementById('keyword').value = '';
            document.getElementById('statusFilter').value = '全部';
            currentType = '全部';
            document.querySelectorAll('.type-tab').forEach(function(item) {
                item.classList.toggle('active', item.dataset.type === '全部');
            });
            render();
        });

        document.querySelectorAll('.tree-node').forEach(function(node) {
            node.addEventListener('click', function() {
                document.querySelectorAll('.tree-node').forEach(function(item) {
                    item.classList.remove('active');
                });
                node.classList.add('active');
                currentFolder = node.dataset.folder || '全部';
                document.getElementById('folderName').textContent = node.dataset.name;
                document.getElementById('folderMeta').textContent = node.dataset.meta;
                render();
            });
        });

        document.getElementById('folderSearch').addEventListener('input', function(event) {
            const value = event.target.value.trim().toLowerCase();
            document.querySelectorAll('#folderTree .tree-node').forEach(function(node) {
                node.style.display = node.textContent.toLowerCase().includes(value) ? 'grid' : 'none';
            });
        });

        render();
    </script>
</body>
</html>
