}

function renderStartInputSelectOptions(input, inputIdx) {
    if (!input.options || input.options.length === 0) input.options = [{ name: '', value: '', desc: '' }];
    let html = '';

    input.options.forEach((opt, optIdx) => {
        html += `
            <div style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border-2);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <div style="font-size: 12px; font-weight: 600; color: var(--text-hi);">选项 ${optIdx + 1}</div>
                    <button class="btn btn-ghost" style="color: var(--text-muted); padding: 0 4px; height: 24px; border-radius: 4px; ${input.options.length <= 1 ? 'opacity: 0.5; cursor: not-allowed;' : ''}" onclick="removeStartInputOption(${inputIdx}, ${optIdx})" ${input.options.length <= 1 ? 'disabled' : ''}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <input type="text" placeholder="选项名称（必填）" value="${escapeAttr(opt.name)}" oninput="updateStartInputOption(${inputIdx}, ${optIdx}, 'name', this.value)" style="width: 100%; border: 1px solid var(--border-2); background: #ffffff; border-radius: 6px; height: 28px; padding: 0 8px; font-size: 12px; color: var(--text-hi); outline: none; box-sizing: border-box;">
                    <input type="text" placeholder="绑定值（必填）" value="${escapeAttr(opt.value || '')}" oninput="updateStartInputOption(${inputIdx}, ${optIdx}, 'value', this.value)" style="width: 100%; border: 1px solid var(--border-2); background: #ffffff; border-radius: 6px; height: 28px; padding: 0 8px; font-size: 12px; color: var(--text-hi); outline: none; box-sizing: border-box;">
                    <input type="text" placeholder="描述（可选）" value="${escapeAttr(opt.desc)}" oninput="updateStartInputOption(${inputIdx}, ${optIdx}, 'desc', this.value)" style="width: 100%; border: 1px solid var(--border-2); background: #ffffff; border-radius: 6px; height: 28px; padding: 0 8px; font-size: 12px; color: var(--text-hi); outline: none; box-sizing: border-box;">
                </div>
            </div>
        `;
    });

    if (input.options.length < 20) {
        html += `<button class="btn btn-ghost" style="width: 100%; height: 28px; font-size: 12px; border: 1px dashed var(--border-2); margin-top: 4px;" onclick="addStartInputOption(${inputIdx})">+ 添加选项 (${input.options.length}/20)</button>`;
    } else {
        html += `<div style="font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 4px;">已达到最大选项数量 (20/20)</div>`;
    }

    return html;
}

function getActiveStartInputOptionsContext() {
    const node = nodes.find(n => n.id === activeStartInputOptionsNodeId);
    if (!node || node.processorType !== 'system.start') return null;
    if (!node.config.inputs || !node.config.inputs[activeStartInputOptionsIndex]) return null;
    const input = normalizeStartInputConfig(node.config.inputs[activeStartInputOptionsIndex]);
    return { node, input, inputIdx: activeStartInputOptionsIndex };
}

function renderStartInputOptionsModal() {
    const body = document.getElementById('start-options-modal-body');
    const context = getActiveStartInputOptionsContext();
    if (!body || !context) return;
    body.innerHTML = renderStartInputSelectOptions(context.input, context.inputIdx);
}

function openStartInputOptionsModal(inputIdx) {
    const node = nodes.find(n => n.id === activeNodeId);
    if (!node || node.processorType !== 'system.start') return;
    if (!node.config.inputs || !node.config.inputs[inputIdx]) return;
    activeStartInputOptionsNodeId = node.id;

function showToastMessage(message, type = 'error') {
    const toast = document.createElement('div');
    toast.style.position = 'fixed';
    toast.style.top = '24px';
    toast.style.left = '50%';
    toast.style.transform = 'translateX(-50%)';
    toast.style.background = type === 'error' ? '#fff2f0' : '#f6ffed';
    toast.style.border = `1px solid ${type === 'error' ? '#ffccc7' : '#b7eb8f'}`;
    toast.style.padding = '10px 24px';
    toast.style.borderRadius = '8px';
    toast.style.boxShadow = '0 4px 12px rgba(0,0,0,0.1)';
    toast.style.display = 'flex';
    toast.style.alignItems = 'center';
    toast.style.gap = '8px';
    toast.style.zIndex = '10000';
    toast.style.fontSize = '14px';
    toast.style.color = 'var(--text-hi)';
    toast.style.transition = 'all 0.3s ease';
    toast.style.opacity = '0';

    const icon = type === 'error'
        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ff4d4f" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>'
        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#52c41a" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>';

    toast.innerHTML = `${icon}<span>${message}</span>`;
    document.body.appendChild(toast);

    requestAnimationFrame(() => {
        toast.style.opacity = '1';
        toast.style.top = '32px';
    });

    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.top = '24px';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

function submitStartInputOptionsModal() {
    const context = getActiveStartInputOptionsContext();
    if (!context) {
        closeStartInputOptionsModal();
        return;
    }
    const input = context.input;
    if (input.options && input.options.length > 0) {
        for (let i = 0; i < input.options.length; i++) {
            const opt = input.options[i];
            if (!opt.name || !opt.name.trim()) {
                showToastMessage(`第 ${i + 1} 个选项名称不能为空`);
                return;
            }
            if (!opt.value || !opt.value.trim()) {
                showToastMessage(`第 ${i + 1} 个选项绑定值不能为空`);
                return;
            }
        }
    }
    closeStartInputOptionsModal();
    showToastMessage('保存成功', 'success');
}

    activeStartInputOptionsNodeId = null;

function updateStartInputOption(inputIdx, optIdx, key, value) {
    const node = nodes.find(n => n.id === activeNodeId);
    if (!node || node.processorType !== 'system.start') return;
    if (!node.config.inputs || !node.config.inputs[inputIdx]) return;

function removeStartInputOption(inputIdx, optIdx) {
    const node = nodes.find(n => n.id === activeNodeId);

    if (!node.config.inputs || !node.config.inputs[inputIdx]) return;

function addStartInputOption(inputIdx) {
    const node = nodes.find(n => n.id === activeNodeId);
    if (!node || node.processorType !== 'system.start') return;
    if (!node.config.inputs || !node.config.inputs[inputIdx]) return;
    const input = normalizeStartInputConfig(node.config.inputs[inputIdx]);
    if (input && (!input.options || input.options.length < 20)) {
        if (!input.options) input.options = [];
        input.options.push({ name: '', value: '', desc: '' });
        touchAutoSave();
        openConfig(activeNodeId);
        if (document.getElementById('start-options-modal')?.classList.contains('open')) {
            renderStartInputOptionsModal();
        }
    }
}

function updateStartInput(index, key, value) {
    const node = nodes.find(n => n.id === activeNodeId);
    if (!node || node.processorType !== 'system.start') return;
    if (!node.config.inputs || !node.config.inputs[index]) return;
    const input = normalizeStartInputConfig(node.config.inputs[index]);
    if (key === 'required') {
        input.required = value === true || value === 'true';
    } else if (key === 'maxUploadCount') {
        input.maxUploadCount = normalizeMaxUploadCount(value);
    } else if (key === 'control') {
        if (isSelectControlConfigurableInput(input.type)) {
            input.control = value === 'select' ? 'select' : 'input';
            if (input.control === 'select' && (!input.options || input.options.length === 0)) {
                input.options = [{ name: '', value: '', desc: '' }];
            }
        }
    } else if (key === 'type') {
        input.type = value === 'select' ? 'text' : value;
        if (isUploadCountConfigurableInput(value)) {
            input.maxUploadCount = normalizeMaxUploadCount(input.maxUploadCount);
        } else {
            delete input.maxUploadCount;
        }
        if (!isSelectControlConfigurableInput(input.type)) {
            delete input.control;
            delete input.options;
        } else {
            input.control = 'input';
        }
    } else {
        input[key] = value;
    }
    touchAutoSave();
    if (key === 'type' || key === 'control') openConfig(activeNodeId);
    renderBoard();
}

function addStartInput() {
    const node = nodes.find(n => n.id === activeNodeId);
    if (!node || node.processorType !== 'system.start') return;
    if (!node.config.inputs) node.config.inputs = [];
    node.config.inputs.push({
        key: createInputKey(),
        label: `输入项 ${node.config.inputs.length + 1}`,
        type: 'text',
        control: 'input',
        required: true
    });
    touchAutoSave();
    openConfig(activeNodeId);
    renderBoard();
}

function removeStartInput(index) {
    const node = nodes.find(n => n.id === activeNodeId);

    if (!node.config.inputs) return;

}

function insertVarToCE(varText, nodeId) {
    const ce = document.getElementById('prompt-ce-' + nodeId);
    if (!ce) return;
    ce.focus();
    const htmlToInsert = `<span class="prompt-var-tag" contenteditable="false" draggable="true" ondragstart="handleVarDragStart(event)" ondragend="this.style.opacity='1'"><span class="drag-handle"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/></svg></span>${varText}<span class="remove" onclick="this.parentElement.remove(); syncPromptFromCE('${nodeId}')">×</span></span>&nbsp;`;
    const sel = window.getSelection();
    if (sel.getRangeAt && sel.rangeCount) {
        let range = sel.getRangeAt(0);
        range.deleteContents();
        let el = document.createElement("div"); el.innerHTML = htmlToInsert;
        let frag = document.createDocumentFragment(), node, lastNode;
        while ( (node = el.firstChild) ) lastNode = frag.appendChild(node);
        range.insertNode(frag);
        if (lastNode) { range = range.cloneRange(); range.setStartAfter(lastNode); range.collapse(true); sel.removeAllRanges(); sel.addRange(range); }
    }
    syncPromptFromCE(nodeId);
    hideAllDropdowns();
}

function handleVarDragStart(e) {
    e.target.style.opacity = '0.4';
    e.dataTransfer.setData('text/html', e.target.outerHTML);
    e.dataTransfer.effectAllowed = 'move';
    window._draggingVar = e.target;
}

function handlePromptDrop(e, nodeId) {
    e.preventDefault();
    const html = e.dataTransfer.getData('text/html');
    if (!html || !html.includes('prompt-var-tag')) return;
    if (window._draggingVar) { window._draggingVar.remove(); window._draggingVar = null; }
    if (document.caretRangeFromPoint) {
        let range = document.caretRangeFromPoint(e.clientX, e.clientY);
        let el = document.createElement("div"); el.innerHTML = html;
        let frag = document.createDocumentFragment(), node;
        while ( (node = el.firstChild) ) frag.appendChild(node);
        range.insertNode(frag);
    }
    syncPromptFromCE(nodeId);
}

function renderCEPrompt(text) {
    if (!text) return '';
    return text.replace(/\[(.*?)\]/g, (match, p1) => {
        return `<span class="prompt-var-tag" contenteditable="false" draggable="true" ondragstart="handleVarDragStart(event)" ondragend="this.style.opacity='1'"><span class="drag-handle"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/></svg></span>${p1}<span class="remove" onclick="this.parentElement.remove(); syncPromptFromCE(this.closest('.prompt-contenteditable').id.replace('prompt-ce-',''))">×</span></span>`;
    });
}

function syncPromptFromCE(nodeId) {
    const ce = document.getElementById('prompt-ce-' + nodeId);
    if (!ce) return;
    let rawText = '';
    for (let child of ce.childNodes) {
        if (child.nodeType === Node.TEXT_NODE) rawText += child.textContent;
        else if (child.nodeType === Node.ELEMENT_NODE) {
            if (child.classList.contains('prompt-var-tag')) {
                const clone = child.cloneNode(true);
                clone.querySelector('.remove')?.remove();
                clone.querySelector('.drag-handle')?.remove();
                rawText += `[${clone.textContent.trim()}]`;
            } else rawText += child.textContent;
        }
    }
    const lenEl = document.getElementById('prompt-len-' + nodeId);
    if (lenEl) lenEl.innerText = rawText.length;
    const node = nodes.find(n => n.id === nodeId);
    if (node) {
        node.config.promptUser = rawText;
        node.config.promptManual = rawText;
        updateCountStatus(nodeId, rawText);
    }
}

function updateCountStatus(nodeId, rawText) {
    const node = nodes.find(n => n.id === nodeId);
    if (!node) return;
    const hasVar = /\[.*?\]/.test(rawText) || (node.config.referenceToken && node.config.referenceSource !== 'upload');
    if (hasVar && node.config.multipleGenerate === false) {
        node.config.multipleGenerate = true;
    }
    const tooltip = document.getElementById('count-tooltip-wrapper-' + nodeId);
    const input = document.getElementById('count-input-' + nodeId);
    
    if (tooltip && input) {
        let maxCount = 100;
        if (hasVar) {
            maxCount = 50;
            tooltip.style.display = 'inline-flex';
        } else {
            tooltip.style.display = 'none';
            if (node.processorType === 'text.generate' && node.config.multipleGenerate === false) {
                maxCount = 10;
            }
        }
        input.max = maxCount.toString();
        if (parseInt(input.value) > maxCount) {
            input.value = maxCount.toString();
            node.config.count = maxCount;
        }
    }
    
    // Also refresh the node config to update switch state if it was forced on
    if (hasVar) {
        // Need a slight delay to avoid reacting while user is typing and losing focus
        setTimeout(() => {
            if (activeNodeId === nodeId) openConfig(nodeId);
        }, 10);
    }
}

function updateConfigCount(nodeId, val) {
    let num = parseInt(val, 10) || 1;
    const node = nodes.find(n => n.id === nodeId);
    if (node) {
        const rawText = node.config.promptUser || node.config.promptManual || '';
        const hasVar = /\[.*?\]/.test(rawText) || (node.config.referenceToken && node.config.referenceSource !== 'upload');
        let maxCount = 100;
        if (hasVar) {
            maxCount = 50;
        } else if (node.processorType === 'text.generate' && node.config.multipleGenerate === false) {
            maxCount = 10;
        }
        
        if (num > maxCount) num = maxCount;
        node.config.count = num;
        const input = document.getElementById('count-input-' + nodeId);
        if (input && input.value !== num.toString()) input.value = num;
    }
}



let currentDropdownNodeId = null;
let currentRefTargetToken = 'referenceToken';
let currentRefTargetSource = 'referenceSource';
let currentSelectedRefToken = '';

function toggleRefVarDropdown(event, nodeId, tokenKey = 'referenceToken', sourceKey = 'referenceSource', acceptTypes = '') {
    event.stopPropagation();
    const el = document.getElementById('global-ref-dropdown');
    if (currentDropdownNodeId === nodeId && el.classList.contains('show') && currentRefTargetToken === tokenKey) {
        hideAllDropdowns();
        return;
    }
    hideAllDropdowns();
    currentDropdownNodeId = nodeId;
    currentRefTargetToken = tokenKey;
    currentRefTargetSource = sourceKey;

        currentSelectedRefToken = currentNode?.config?.inputs?.[tokenKey]?.token || '';
    } else if (sourceKey === 'review_item') {
        currentSelectedRefToken = (currentNode?.config?.reviewItems || []).find(item => item.id === tokenKey)?.token || '';
    } else {
        currentSelectedRefToken = currentNode?.config?.[tokenKey] || '';
    }
    
    let acceptRef = acceptTypes ? acceptTypes.split(',') : ['text', 'image', 'video', 'number', 'resolution', 'image_array', 'video_array', 'count'];

    const trigger = event.currentTarget;
    const rect = trigger.getBoundingClientRect();
    el.style.top = (rect.bottom + 4) + 'px';
    el.style.left = rect.left + 'px';
    el.style.width = rect.width + 'px';
    el.classList.add('show');
}

function renderVarDropdownOptions(nodeId) {
    const variables = getAvailableNodeInputs(nodeId);

        const hasTextVars = variables.some(v => v.source === source && TEXT_LIKE_INPUT_TYPES.includes(v.type));
        return `<div class="cascader-item ${!hasTextVars ? 'disabled' : ''}" onmouseenter="showVarSubmenu(event, '${source}', '${nodeId}')" onclick="showVarSubmenu(event, '${source}', '${nodeId}')">${source} <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:auto"><polyline points="9 18 15 12 9 6"></polyline></svg></div>`;
    }).join('');
}

function renderRefVarDropdownOptions(nodeId, acceptRef) {
    const blockedTokens = currentRefTargetSource === 'review_item' ? getReviewSelectedTokens(nodeId, currentRefTargetToken) : [];
    const variables = getAvailableNodeInputs(nodeId).filter(v => !blockedTokens.includes(v.token));
    const nodesInWorkflow = Array.from(new Set(variables.map(v => v.source)));
    if (!nodesInWorkflow.length) return '<div style="padding:12px; color:var(--text-muted); text-align:center;">无可用的文件变量</div>';
    return nodesInWorkflow.map(source => {
        const hasValidVars = variables.some(v => v.source === source && (acceptRef.includes(v.type) || acceptRef.includes(v.type === 'video.generate' ? 'video' : v.type)));
        const hasSelected = variables.some(v => v.source === source && v.token === currentSelectedRefToken);
        return `<div class="cascader-item ${!hasValidVars ? 'disabled' : ''} ${hasSelected ? 'selected' : ''}" onmouseenter="showRefVarSubmenu(event, '${source}', '${nodeId}', '${acceptRef.join(',')}')" onclick="showRefVarSubmenu(event, '${source}', '${nodeId}', '${acceptRef.join(',')}')">${source} <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:auto"><polyline points="9 18 15 12 9 6"></polyline></svg></div>`;
    }).join('');
}

function showRefVarSubmenu(event, source, nodeId, acceptRefStr) {
    const sub = document.getElementById('global-ref-submenu');
    const acceptRef = acceptRefStr.split(',');
    const blockedTokens = currentRefTargetSource === 'review_item' ? getReviewSelectedTokens(nodeId, currentRefTargetToken) : [];
    const variables = getAvailableNodeInputs(nodeId).filter(v => v.source === source && !blockedTokens.includes(v.token) && (acceptRef.includes(v.type) || acceptRef.includes(v.type === 'video.generate' ? 'video' : v.type)));
    if (!variables.length) { sub.classList.remove('show'); return; }
    let html = '';
    variables.forEach(v => {
        const selected = v.token === currentSelectedRefToken;
        html += `<div class="cascader-item ${selected ? 'selected' : ''}" onclick="selectRefVariable('${v.token}')">${v.label}${selected ? '<span style="margin-left:auto;">✓</span>' : ''}</div>`;
    });
    sub.innerHTML = html;
    const rect = event.currentTarget.getBoundingClientRect();
    sub.style.top = rect.top + 'px';
    sub.style.left = (rect.left - 180) + 'px';
    sub.classList.add('show');
    }

    function selectRefVariable(token) {
    if (!currentDropdownNodeId) return;
    const node = nodes.find(n => n.id === currentDropdownNodeId);
    if (!node) return;

    if (currentRefTargetSource === 'wrapper_input') {
        if (!node.config.inputs) node.config.inputs = {};
        if (!node.config.inputs[currentRefTargetToken]) node.config.inputs[currentRefTargetToken] = { token: '' };
        node.config.inputs[currentRefTargetToken].token = token;
    } else if (currentRefTargetSource === 'review_item') {
        if (getReviewSelectedTokens(currentDropdownNodeId, currentRefTargetToken).includes(token)) {
            hideAllDropdowns();
            return;
        }
        updateReviewItem(currentDropdownNodeId, currentRefTargetToken, token);
        hideAllDropdowns();
        return;
    } else {
        node.config[currentRefTargetToken] = token;
        node.config[currentRefTargetSource] = 'node';
    }

    touchAutoSave();
    openConfig(currentDropdownNodeId);
    renderBoard();
    hideAllDropdowns();
}

    
function hideAllDropdowns() {
    document.querySelectorAll('#global-dropdowns > div').forEach(el => el.classList.remove('show'));
    currentDropdownNodeId = null;
    currentWrapperOutputNodeId = '';
    currentWrapperOutputId = '';
}

function getHoverTooltip() {
    let tooltip = document.getElementById('hover-tooltip');
    if (!tooltip) {
        tooltip = document.createElement('div');
        tooltip.id = 'hover-tooltip';
        tooltip.className = 'hover-tooltip';
        document.body.appendChild(tooltip);
    }
    return tooltip;
}

function positionHoverTooltip(event) {
    const tooltip = document.getElementById('hover-tooltip');
    if (!tooltip || tooltip.style.display === 'none') return;
    const margin = 12;
    const width = tooltip.offsetWidth || 280;
    const height = tooltip.offsetHeight || 40;
    let left = event.clientX + margin;
    let top = event.clientY + margin;
    if (left + width > window.innerWidth - margin) left = event.clientX - width - margin;
    if (top + height > window.innerHeight - margin) top = event.clientY - height - margin;
    tooltip.style.left = Math.max(margin, left) + 'px';
    tooltip.style.top = Math.max(margin, top) + 'px';
}

function showHoverTooltip(event) {
    const target = event.target.closest('[data-tooltip]');
    if (!target) return;
    const text = target.getAttribute('data-tooltip');
    if (!text) return;
    const tooltip = getHoverTooltip();
    tooltip.textContent = text;
    tooltip.style.display = 'block';
    positionHoverTooltip(event);
}

function hideHoverTooltip() {
    const tooltip = document.getElementById('hover-tooltip');
    if (tooltip) tooltip.style.display = 'none';
}

document.addEventListener('click', function(e) {
    if (!e.target.closest('.custom-model-select') && !e.target.closest('#global-dropdowns') && !e.target.closest('[onclick*="toggle"]')) {
        hideAllDropdowns();
    }
});

document.addEventListener('mouseover', showHoverTooltip);
document.addEventListener('mousemove', positionHoverTooltip);
document.addEventListener('mouseout', function(e) {
    if (e.target.closest('[data-tooltip]')) hideHoverTooltip();
});

document.querySelector('.config-body')?.addEventListener('scroll', function() {
    hideAllDropdowns();
    hideHoverTooltip();
});
// --- End Helpers ---

function mockPublishValidation(btn) {
    const originalText = btn.innerHTML;
    
    // Use an explicit spinning animation and nowrap text for the button
    btn.innerHTML = '<style>@keyframes btnSpin { to { transform: rotate(360deg); } }</style><div style="width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: btnSpin 0.8s linear infinite; margin-right: 6px; flex-shrink: 0;"></div>校验中';
    btn.disabled = true;
    
    const errEl = document.getElementById('publish-error');
    if (errEl) errEl.style.display = 'none';

    setTimeout(() => {
        btn.innerHTML = originalText;
        btn.disabled = false;
        
        if (errEl) errEl.style.display = 'block';
    }, 2000);
}

// Initialize
renderPalette();
renderBoard();


</script>

    <div class="var-dropdown-menu" id="global-var-dropdown"></div>

    <div class="ref-dropdown-menu" id="global-ref-dropdown"></div>
    <div class="var-submenu" id="global-ref-submenu"></div>
</div>
