<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作流画布 - 拖拽式编辑器</title>
    <style>
        html, body { height: 100%; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; background: #f5f7fa; color: #333; }

        .ide-layout { display: flex; flex-direction: column; height: 100%; }
        .top-nav { height: 56px; background: #fff; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,0.02); }
        .nav-left { display: flex; align-items: center; gap: 16px; font-weight: 600; font-size: 15px; }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .badge { background: #e6f4ff; color: #1677ff; border: 1px solid #91caff; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: normal; }

        .workspace { display: flex; flex: 1; position: relative; overflow: hidden; }

        .sidebar-left { width: 260px; background: #fff; border-right: 1px solid #e8e8e8; display: flex; flex-direction: column; z-index: 10; box-shadow: 1px 0 4px rgba(0,0,0,0.02); }
        .sidebar-title { padding: 16px; font-weight: 600; font-size: 13px; color: #888; border-bottom: 1px solid #f0f0f0; background: #fafafa; }
        .palette-tabs { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 16px; border-bottom: 1px solid #f5f5f5; background: #fff; }
        .palette-tab { border: 1px solid #e8e8e8; background: #fff; color: #666; border-radius: 999px; padding: 4px 10px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .palette-tab.active { background: #e6f4ff; color: #1677ff; border-color: #91caff; }
        .component-list { padding: 8px 0 16px; overflow-y: auto; }
        .palette-group { padding-top: 4px; }
        .palette-group-title { padding: 8px 16px 0; font-size: 12px; color: #999; font-weight: 600; }
        .component-item { margin: 8px 16px; padding: 10px 16px; background: #fff; border: 1px solid #e8e8e8; border-radius: 6px; cursor: grab; font-size: 13px; display: flex; align-items: center; gap: 10px; transition: all 0.2s; }
        .component-item:hover { border-color: #1677ff; box-shadow: 0 4px 12px rgba(22,119,255,0.1); color: #1677ff; transform: translateY(-1px); }
        .component-item:active { cursor: grabbing; }

        .canvas-container { flex: 1; position: relative; background-image: radial-gradient(circle, #d9d9d9 1px, transparent 1px); background-size: 20px 20px; outline: none; user-select: none; }
        #svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: visible; }
        #svg-layer path { pointer-events: stroke; cursor: pointer; transition: stroke 0.2s, stroke-width 0.2s; }
        #svg-layer path:hover { stroke: #ff4d4f !important; stroke-width: 4 !important; }
        #nodes-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        .node { position: absolute; width: 220px; background: #fff; border-radius: 8px; border: 1px solid #d9d9d9; box-shadow: 0 2px 8px rgba(0,0,0,0.06); pointer-events: auto; transition: box-shadow 0.2s, border-color 0.2s; }
        .node.active { border-color: #1677ff; box-shadow: 0 0 0 2px rgba(22,119,255,0.2); z-index: 10; }
        .node-header { padding: 8px 12px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #f0f0f0; background: #fafafa; border-radius: 8px 8px 0 0; cursor: move; }
        .node-body { padding: 12px; font-size: 12px; color: #666; min-height: 48px; line-height: 1.6; }
        .node-close { color: #999; cursor: pointer; font-size: 14px; margin-left: auto; font-weight: normal; }
        .node-close:hover { color: #ff4d4f; }
        .summary-line { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .port { position: absolute; width: 12px; height: 12px; background: #fff; border: 2px solid #d9d9d9; border-radius: 50%; top: 50%; transform: translateY(-50%); cursor: crosshair; z-index: 5; transition: 0.2s; }
        .port:hover { border-color: #1677ff; background: #e6f4ff; scale: 1.2; box-shadow: 0 0 0 4px rgba(22,119,255,0.1); }
        .port-in { left: -7px; }
        .port-out { right: -7px; }

        .sidebar-right { position: absolute; right: 0; top: 0; bottom: 0; width: 320px; background: #fff; border-left: 1px solid #e8e8e8; box-shadow: -2px 0 12px rgba(0,0,0,0.05); transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1); z-index: 20; display: flex; flex-direction: column; }
        .sidebar-right.open { transform: translateX(0); }
        .config-header { padding: 16px; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; justify-content: space-between; font-weight: 600; font-size: 14px; }
        .config-close { cursor: pointer; color: #999; border: none; background: none; font-size: 18px; }
        .config-close:hover { color: #333; }
        .config-body { padding: 16px; flex: 1; overflow-y: auto; }

        .btn { padding: 6px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; background: #fff; border-color: #d9d9d9; display: inline-flex; align-items: center; gap: 6px; }
        .btn:hover { color: #1677ff; border-color: #1677ff; }
        .btn-primary { background: #1677ff; color: #fff; border-color: #1677ff; }
        .btn-primary:hover { background: #4096ff; border-color: #4096ff; color: #fff; }

        .form-item { margin-bottom: 20px; }
        .form-item label { display: block; font-size: 13px; color: #333; margin-bottom: 8px; font-weight: 500; }
        .form-item input,
        .form-item textarea,
        .form-item select { width: 100%; padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; font-family: inherit; transition: 0.2s; outline: none; }
        .form-item input:focus,
        .form-item textarea:focus,
        .form-item select:focus { border-color: #1677ff; box-shadow: 0 0 0 2px rgba(22,119,255,0.1); }
        .form-hint { font-size: 12px; color: #888; margin-top: 6px; line-height: 1.6; }
        .var-tag { display: inline-block; margin: 4px 6px 0 0; background: #e6f7ff; border: 1px solid #91d5ff; color: #1890ff; padding: 1px 6px; border-radius: 4px; font-family: monospace; font-size: 11px; }
        .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #333; }
        .checkbox-row input { width: auto; }
        .empty-hint { color: #bfbfbf; text-align: center; padding-top: 40px; font-size: 13px; }
    </style>
</head>
<body>

<div class="ide-layout">
    <div class="top-nav">
        <div class="nav-left">
            <button class="btn" style="padding: 4px 8px; border: none;" onclick="parent.postMessage({action:'closeCurrentTab'}, '*')">
                ← 返回
            </button>
            <span id="head-title">未命名工作流</span>
            <span class="badge">草稿状态</span>
        </div>
        <div class="nav-right">
            <span style="font-size: 12px; color: #999; margin-right: 12px;">提示：从左侧拖拽节点到画布，拖拽连接点进行连线，双击连线可删除</span>
            <button class="btn" onclick="alert('已保存草稿')">保存画布</button>
            <button class="btn btn-primary" onclick="alert('试运行逻辑待接入')">▶ 试运行</button>
        </div>
    </div>

    <div class="workspace">
        <div class="sidebar-left">
            <div class="sidebar-title">Processor 节点库</div>
            <div class="palette-tabs" id="paletteTabs"></div>
            <div class="component-list" id="palette"></div>
        </div>

        <div class="canvas-container" id="canvas" ondragover="event.preventDefault()" ondrop="onDrop(event)">
            <svg id="svg-layer">
                <path id="temp-edge" stroke="#1677ff" stroke-width="2" fill="none" stroke-dasharray="5,5" style="display:none;"></path>
            </svg>
            <div id="nodes-layer"></div>
        </div>

        <div class="sidebar-right" id="config-panel">
            <div class="config-header">
                <span id="config-title">节点配置</span>
                <button class="config-close" onclick="closeConfig()">×</button>
            </div>
            <div class="config-body" id="config-form"></div>
        </div>
    </div>
</div>

<script>
const PALETTE_CATEGORIES = [
    { key: 'input', label: '输入' },
    { key: 'generate', label: '生成' },
    { key: 'control', label: '审查' },
    { key: 'output', label: '输出' }
];

function escapeHtml(value = '') {
    return String(value).replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    }[char]));
}

function getNodeProcessorType(node) {
    return node.processorType || LEGACY_TYPE_MAP[node.type];
}

function getNodeDef(node) {
    return PROCESSOR_REGISTRY[getNodeProcessorType(node)];
}

function getNodeLabel(node) {
    if (!node) return '';
    return node.config?.name || getNodeDef(node)?.title || '未命名节点';
}

function getUpstreamNodes(nodeId, allowedTypes = []) {
    const sourceIds = edges.filter(edge => edge.target === nodeId).map(edge => edge.source);
    return nodes.filter(node => {
        if (!sourceIds.includes(node.id)) return false;
        if (!allowedTypes.length) return true;
        return allowedTypes.includes(getNodeProcessorType(node));
    });
}

function buildNodeOptions(nodeId, allowedTypes = [], selectedValue = '', placeholder = '请选择') {
    const candidates = getUpstreamNodes(nodeId, allowedTypes);
    const options = [`<option value="">${placeholder}</option>`].concat(
        candidates.map(node => {
            const value = `{{${node.id}.output}}`;
            return `<option value="${escapeHtml(value)}" ${selectedValue === value ? 'selected' : ''}>${escapeHtml(getNodeLabel(node))} · ${node.id}</option>`;
        })
    );
    return options.join('');
}

function renderVariableHint(nodeId, allowedTypes = []) {
    const candidates = getUpstreamNodes(nodeId, allowedTypes);
    if (!candidates.length) {
        return '<div class="form-hint">当前还没有可引用的上游节点，连线后可在这里继续配置。</div>';
    }
    return `<div class="form-hint">可引用变量：${candidates.map(node => `<span class="var-tag">{{${escapeHtml(node.id)}.output}}</span>`).join('')}</div>`;
}

function renderCheckboxField(label, key, checked, hint = '') {
    return `
        <div class="form-item">
            <label>${label}</label>
            <label class="checkbox-row">
                <input type="checkbox" ${checked ? 'checked' : ''} onchange="updateCheckboxConfig('${key}', this.checked)">
                <span>${label}</span>
            </label>
            ${hint ? `<div class="form-hint">${hint}</div>` : ''}
        </div>
    `;
}

function renderSummary(lines) {
    return lines.map(line => `<div class="summary-line">${escapeHtml(line)}</div>`).join('');
}

const PROCESSOR_REGISTRY = {
    'system.start': {
        title: '开始节点',
        icon: '🚀',
        color: '#52c41a',
        category: 'input',
        nodeKind: 'system',
        hasIn: false,
        hasOut: true,
        createDefaultConfig: () => ({
            name: '新建工作流',
            materialPool: '',
            targetCount: 10,
            inputParams: 'product_name\ncampaign_goal'
        }),
        getSummary: (config) => renderSummary([
            `原料池：${config.materialPool || '未设置'}`,
            `目标产出：${config.targetCount || 10}`,
            `输入参数：${config.inputParams ? config.inputParams.split('\n').filter(Boolean).length : 0} 个`
        ]),
        renderConfig: (node) => `
            <div class="form-item">
                <label>工作流名称</label>
                <input type="text" value="${escapeHtml(node.config.name || '')}" oninput="updateConfig('name', this.value)">
            </div>
            <div class="form-item">
                <label>原料 / 物料池</label>
                <input type="text" value="${escapeHtml(node.config.materialPool || '')}" placeholder="如：减脂项目-头部素材池" oninput="updateConfig('materialPool', this.value)">
                <div class="form-hint">开始节点要先明确本次运行使用哪一组原料或物料池。</div>
            </div>
            <div class="form-item">
                <label>目标产出数量</label>
                <input type="number" min="1" value="${escapeHtml(node.config.targetCount || 10)}" oninput="updateConfig('targetCount', this.value)">
            </div>
            <div class="form-item">
                <label>动态输入参数</label>
                <textarea rows="5" placeholder="每行一个参数名" oninput="updateConfig('inputParams', this.value)">${escapeHtml(node.config.inputParams || '')}</textarea>
                <div class="form-hint">后续节点可通过 <span class="var-tag">{{${escapeHtml(node.id)}.参数名}}</span> 引用开始节点定义的输入。</div>
            </div>
        `
    },
    'text.generate': {
        title: '文本生成',
        icon: '✍️',
        color: '#fa8c16',
        category: 'generate',
        nodeKind: 'processor',
        hasIn: true,
        hasOut: true,
        createDefaultConfig: () => ({
            name: '文本生成',
            prompt: '',
            inputRef: '',
            referenceImage: '',
            count: 10,
            style: '种草'
        }),
        getSummary: (config) => renderSummary([
            `节点名称：${config.name || '文本生成'}`,
            `裂变数量：${config.count || 10} 条`,
            `文案风格：${config.style || '未设置'}`
        ]),
        renderConfig: (node) => `
            <div class="form-item">
                <label>节点名称</label>
                <input type="text" value="${escapeHtml(node.config.name || '')}" oninput="updateConfig('name', this.value)">
            </div>
            <div class="form-item">
                <label>主输入说明</label>
                <textarea rows="4" placeholder="描述要生成什么文本" oninput="updateConfig('prompt', this.value)">${escapeHtml(node.config.prompt || '')}</textarea>
            </div>
            <div class="form-item">
                <label>引用上游变量</label>
                <select onchange="updateConfig('inputRef', this.value)">
                    ${buildNodeOptions(node.id, ['system.start', 'text.generate', 'image.generate', 'video.generate'], node.config.inputRef || '', '请选择上游输出')}
                </select>
                ${renderVariableHint(node.id, ['system.start', 'text.generate', 'image.generate', 'video.generate'])}
            </div>
            <div class="form-item">
                <label>参考图片</label>
                <input type="text" value="${escapeHtml(node.config.referenceImage || '')}" placeholder="可填写图片链接或变量，如 {{n3.output}}" oninput="updateConfig('referenceImage', this.value)">
            </div>
            <div class="form-item">
                <label>裂变数量</label>
                <input type="number" min="1" max="100" value="${escapeHtml(node.config.count || 10)}" oninput="updateConfig('count', this.value)">
                <div class="form-hint">会议里明确文案裂变数量范围为 1-100。</div>
            </div>
            <div class="form-item">
                <label>文案风格</label>
                <select onchange="updateConfig('style', this.value)">
                    <option value="种草" ${node.config.style === '种草' ? 'selected' : ''}>种草</option>
                    <option value="信息流" ${node.config.style === '信息流' ? 'selected' : ''}>信息流</option>
                    <option value="口播" ${node.config.style === '口播' ? 'selected' : ''}>口播</option>
                    <option value="促转化" ${node.config.style === '促转化' ? 'selected' : ''}>促转化</option>
                </select>
            </div>
        `
    },
    'image.generate': {
        title: '图片生成',
        icon: '🎨',
        color: '#722ed1',
        category: 'generate',
        nodeKind: 'processor',
        hasIn: true,
        hasOut: true,
        createDefaultConfig: () => ({
            name: '图片生成',
            prompt: '',
            inputRef: '',
            referenceImage: '',
            count: 4,
            ratio: '3:4',
            autoCrop: true,
            removeWatermark: true
        }),
        getSummary: (config) => renderSummary([
            `节点名称：${config.name || '图片生成'}`,
            `生成数量：${config.count || 4} 张`,
            `目标比例：${config.ratio || '3:4'}`
        ]),
        renderConfig: (node) => `
            <div class="form-item">
                <label>节点名称</label>
                <input type="text" value="${escapeHtml(node.config.name || '')}" oninput="updateConfig('name', this.value)">
            </div>
            <div class="form-item">
                <label>生成说明</label>
                <textarea rows="4" placeholder="描述图片生成目标" oninput="updateConfig('prompt', this.value)">${escapeHtml(node.config.prompt || '')}</textarea>
            </div>
            <div class="form-item">
                <label>引用上游变量</label>
                <select onchange="updateConfig('inputRef', this.value)">
                    ${buildNodeOptions(node.id, ['system.start', 'text.generate', 'image.generate', 'video.generate'], node.config.inputRef || '', '请选择上游输出')}
                </select>
                ${renderVariableHint(node.id, ['system.start', 'text.generate', 'image.generate', 'video.generate'])}
            </div>
            <div class="form-item">
                <label>参考图</label>
                <input type="text" value="${escapeHtml(node.config.referenceImage || '')}" placeholder="可填写图片链接或变量，如 {{n2.output}}" oninput="updateConfig('referenceImage', this.value)">
            </div>
            <div class="form-item">
                <label>生成数量</label>
                <input type="number" min="1" max="50" value="${escapeHtml(node.config.count || 4)}" oninput="updateConfig('count', this.value)">
            </div>
            <div class="form-item">
                <label>目标比例</label>
                <select onchange="updateConfig('ratio', this.value)">
                    <option value="1:1" ${node.config.ratio === '1:1' ? 'selected' : ''}>1:1</option>
                    <option value="3:4" ${node.config.ratio === '3:4' ? 'selected' : ''}>3:4</option>
                    <option value="9:16" ${node.config.ratio === '9:16' ? 'selected' : ''}>9:16</option>
                    <option value="16:9" ${node.config.ratio === '16:9' ? 'selected' : ''}>16:9</option>
                </select>
            </div>
            ${renderCheckboxField('生成后自动裁剪', 'autoCrop', !!node.config.autoCrop, '裁剪动作内聚在图片节点里，不再拆独立节点。')}
            ${renderCheckboxField('生成后自动去水印', 'removeWatermark', !!node.config.removeWatermark, '去水印同样内聚在图片节点里。')}
        `
    },
    'video.generate': {
        title: '视频生成',
        icon: '🎬',
        color: '#13c2c2',
        category: 'generate',
        nodeKind: 'processor',
        hasIn: true,
        hasOut: true,
        createDefaultConfig: () => ({
            name: '视频生成',
            prompt: '',
            inputRef: '',
            referenceAsset: '',
            count: 1
        }),
        getSummary: (config) => renderSummary([
            `节点名称：${config.name || '视频生成'}`,
            `生成数量：${config.count || 1} 条`,
            `引用输入：${config.inputRef || '未设置'}`
        ]),
        renderConfig: (node) => `
            <div class="form-item">
                <label>节点名称</label>
                <input type="text" value="${escapeHtml(node.config.name || '')}" oninput="updateConfig('name', this.value)">
            </div>
            <div class="form-item">
                <label>生成说明</label>
                <textarea rows="4" placeholder="描述视频生成目标" oninput="updateConfig('prompt', this.value)">${escapeHtml(node.config.prompt || '')}</textarea>
            </div>
            <div class="form-item">
                <label>引用上游变量</label>
                <select onchange="updateConfig('inputRef', this.value)">
                    ${buildNodeOptions(node.id, ['system.start', 'text.generate', 'image.generate', 'video.generate'], node.config.inputRef || '', '请选择上游输出')}
                </select>
                ${renderVariableHint(node.id, ['system.start', 'text.generate', 'image.generate', 'video.generate'])}
            </div>
            <div class="form-item">
                <label>参考素材</label>
                <input type="text" value="${escapeHtml(node.config.referenceAsset || '')}" placeholder="可填写图片/视频链接或变量" oninput="updateConfig('referenceAsset', this.value)">
            </div>
            <div class="form-item">
                <label>生成数量</label>
                <input type="number" min="1" max="20" value="${escapeHtml(node.config.count || 1)}" oninput="updateConfig('count', this.value)">
                <div class="form-hint">当前版本只保留最小配置，不暴露拆解、混剪、换脸等复杂 processor 细项。</div>
            </div>
        `
    },
    'control.review': {
        title: '人工审查',
        icon: '👨‍💻',
        color: '#ff4d4f',
        category: 'control',
        nodeKind: 'processor',
        hasIn: true,
        hasOut: true,
        createDefaultConfig: () => ({
            name: '人工审查',
            reviewTarget: '',
            reviewRule: '',
            reviewMode: 'blacklist',
            allowBulkPass: true
        }),
        getSummary: (config) => renderSummary([
            `节点名称：${config.name || '人工审查'}`,
            `审查对象：${config.reviewTarget || '未设置'}`,
            '流转方式：通过后立即进入下游'
        ]),
        renderConfig: (node) => `
            <div class="form-item">
                <label>节点名称</label>
                <input type="text" value="${escapeHtml(node.config.name || '')}" oninput="updateConfig('name', this.value)">
            </div>
            <div class="form-item">
                <label>审查对象</label>
                <select onchange="updateConfig('reviewTarget', this.value)">
                    ${buildNodeOptions(node.id, ['text.generate', 'image.generate', 'video.generate'], node.config.reviewTarget || '', '请选择要审查的上游结果')}
                </select>
            </div>
            <div class="form-item">
                <label>审查标准</label>
                <textarea rows="4" placeholder="填写通过 / 拒绝的判断标准" oninput="updateConfig('reviewRule', this.value)">${escapeHtml(node.config.reviewRule || '')}</textarea>
            </div>
            <div class="form-item">
                <label>审查方式</label>
                <select onchange="updateConfig('reviewMode', this.value)">
                    <option value="blacklist" ${node.config.reviewMode === 'blacklist' ? 'selected' : ''}>黑白名单勾选</option>
                    <option value="single" ${node.config.reviewMode === 'single' ? 'selected' : ''}>逐条通过 / 拒绝</option>
                </select>
            </div>
            ${renderCheckboxField('允许全部通过', 'allowBulkPass', !!node.config.allowBulkPass, '会议里要求支持快捷操作与全部通过。')}
            <div class="form-item">
                <label>流转说明</label>
                <div class="form-hint">人工审查默认是流式卡点：单个结果一旦通过，就立即流转到下游节点，不等待全量审核结束。</div>
            </div>
        `
    },
    'system.end': {
        title: '结束节点',
        icon: '🏁',
        color: '#8c8c8c',
        category: 'output',
        nodeKind: 'system',
        hasIn: true,
        hasOut: false,
        createDefaultConfig: () => ({
            name: '结束节点'
        }),
        getSummary: () => renderSummary([
            '进入任务系统',
            '不再配置复杂出库路由'
        ]),
        renderConfig: (node) => `
            <div class="form-item">
                <label>节点名称</label>
                <input type="text" value="${escapeHtml(node.config.name || '')}" oninput="updateConfig('name', this.value)">
            </div>
            <div class="form-item">
                <label>结束语义</label>
                <div class="form-hint">结束节点不再提供复杂选项。工作流到达这里后，结果默认进入任务系统，由任务页继续承接查看、审查、入库与追溯。</div>
            </div>
        `
    }
};

const LEGACY_TYPE_MAP = {
    START: 'system.start',
    COPY: 'text.generate',
    IMAGE: 'image.generate',
    VIDEO: 'video.generate',
    REVIEW: 'control.review',
    END: 'system.end'
};

let activePaletteCategory = 'all';
let nodes = [
    { id: 'n1', processorType: 'system.start', x: 80, y: 160, config: { name: '新建工作流', materialPool: '减脂项目-头部素材池', targetCount: 20, inputParams: 'product_name\ncampaign_goal' } },
    { id: 'n2', processorType: 'text.generate', x: 340, y: 160, config: { name: '文案裂变', prompt: '围绕产品卖点生成多方向文案', inputRef: '{{n1.output}}', referenceImage: '', count: 10, style: '信息流' } },
    { id: 'n3', processorType: 'image.generate', x: 600, y: 160, config: { name: '图片裂变', prompt: '根据文案与参考图生成图片', inputRef: '{{n2.output}}', referenceImage: '', count: 4, ratio: '3:4', autoCrop: true, removeWatermark: true } },
    { id: 'n4', processorType: 'video.generate', x: 860, y: 160, config: { name: '视频生成', prompt: '将图片与文案组装成短视频', inputRef: '{{n3.output}}', referenceAsset: '', count: 1 } },
    { id: 'n5', processorType: 'control.review', x: 1120, y: 160, config: { name: '人工审查', reviewTarget: '{{n4.output}}', reviewRule: '通过：可投放；拒绝：明显重复或质量不达标', reviewMode: 'single', allowBulkPass: true } },
    { id: 'n6', processorType: 'system.end', x: 1380, y: 160, config: { name: '结束节点' } }
];

let edges = [
    { id: 'e1', source: 'n1', target: 'n2' },
    { id: 'e2', source: 'n2', target: 'n3' },
    { id: 'e3', source: 'n3', target: 'n4' },
    { id: 'e4', source: 'n4', target: 'n5' },
    { id: 'e5', source: 'n5', target: 'n6' }
];

let activeNodeId = null;
let draggingNodeId = null;
let dragOffset = { x: 0, y: 0 };
let drawingEdge = null;

const canvasEl = document.getElementById('canvas');
const nodesLayer = document.getElementById('nodes-layer');
const svgLayer = document.getElementById('svg-layer');
const tempEdgeEl = document.getElementById('temp-edge');

function getWorkflowNameNode() {
    return nodes.find(node => getNodeProcessorType(node) === 'system.start');
}

function renderPaletteTabs() {
    const tabs = document.getElementById('paletteTabs');
    const items = [{ key: 'all', label: '全部' }].concat(PALETTE_CATEGORIES);
    tabs.innerHTML = items.map(item => `
        <button class="palette-tab ${activePaletteCategory === item.key ? 'active' : ''}" onclick="setPaletteCategory('${item.key}')">${item.label}</button>
    `).join('');
}

function setPaletteCategory(category) {
    activePaletteCategory = category;
    renderPaletteTabs();
    initPalette();
}

function initPalette() {
    const palette = document.getElementById('palette');
    const groups = {};
    Object.entries(PROCESSOR_REGISTRY).forEach(([processorType, info]) => {
        if (activePaletteCategory !== 'all' && info.category !== activePaletteCategory) return;
        if (!groups[info.category]) groups[info.category] = [];
        groups[info.category].push({ processorType, info });
    });

    palette.innerHTML = PALETTE_CATEGORIES
        .filter(category => groups[category.key] && groups[category.key].length)
        .map(category => `
            <div class="palette-group">
                <div class="palette-group-title">${category.label}</div>
                ${groups[category.key].map(({ processorType, info }) => `
                    <div class="component-item" draggable="true" ondragstart="onPaletteDragStart(event, '${processorType}')">
                        <span style="font-size:18px">${info.icon}</span>
                        <span>${info.title}</span>
                    </div>
                `).join('')}
            </div>
        `).join('');
}

function onPaletteDragStart(e, processorType) {
    e.dataTransfer.setData('processorType', processorType);
}

function renderBoard() {
    nodesLayer.innerHTML = '';

    const startNode = getWorkflowNameNode();
    document.getElementById('head-title').innerText = startNode ? (startNode.config.name || '未命名工作流') : '未命名工作流';

    nodes.forEach(node => {
        const info = getNodeDef(node);
        if (!info) return;

        const el = document.createElement('div');
        el.className = `node ${activeNodeId === node.id ? 'active' : ''}`;
        el.id = node.id;
        el.style.left = node.x + 'px';
        el.style.top = node.y + 'px';
        el.onmousedown = (e) => onNodeMouseDown(e, node.id);

        let portsHtml = '';
        if (info.hasIn) portsHtml += `<div class="port port-in" onmousedown="onPortMouseDown(event, '${node.id}', 'in')" onmouseup="onPortMouseUp(event, '${node.id}', 'in')"></div>`;
        if (info.hasOut) portsHtml += `<div class="port port-out" onmousedown="onPortMouseDown(event, '${node.id}', 'out')" onmouseup="onPortMouseUp(event, '${node.id}', 'out')"></div>`;

        const desc = info.getSummary ? info.getSummary(node.config || {}) : '<span style="color:#bfbfbf">暂无配置参数</span>';

        el.innerHTML = `
            ${portsHtml}
            <div class="node-header" style="border-top: 3px solid ${info.color}">
                <span>${info.icon}</span> ${info.title}
                <span class="node-close" onclick="deleteNode(event, '${node.id}')">×</span>
            </div>
            <div class="node-body">${desc}</div>
        `;
        nodesLayer.appendChild(el);
    });

    renderEdges();
}

function renderEdges() {
    svgLayer.innerHTML = '';
    svgLayer.appendChild(tempEdgeEl);

    edges.forEach(edge => {
        const sNode = document.getElementById(edge.source);
        const tNode = document.getElementById(edge.target);
        if (!sNode || !tNode) return;

        const sx = sNode.offsetLeft + sNode.offsetWidth;
        const sy = sNode.offsetTop + sNode.offsetHeight / 2;
        const tx = tNode.offsetLeft;
        const ty = tNode.offsetTop + tNode.offsetHeight / 2;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', getBezierPath(sx, sy, tx, ty));
        path.setAttribute('stroke', '#b0b0b0');
        path.setAttribute('stroke-width', '2');
        path.setAttribute('fill', 'none');

        const title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
        title.textContent = '双击删除连线';
        path.appendChild(title);

        path.ondblclick = () => {
            edges = edges.filter(item => item.id !== edge.id);
            renderEdges();
        };

        svgLayer.appendChild(path);
    });
}

function getBezierPath(x1, y1, x2, y2) {
    const offset = Math.max(Math.abs(x2 - x1) / 2, 60);
    return `M ${x1} ${y1} C ${x1 + offset} ${y1}, ${x2 - offset} ${y2}, ${x2} ${y2}`;
}

function onNodeMouseDown(e, id) {
    if (e.target.classList.contains('node-close') || e.target.classList.contains('port')) return;

    activeNodeId = id;
    renderBoard();
    openConfig(id);

    draggingNodeId = id;
    const el = document.getElementById(id);
    const rect = el.getBoundingClientRect();
    dragOffset.x = e.clientX - rect.left;
    dragOffset.y = e.clientY - rect.top;
}

function onPortMouseDown(e, nodeId, type) {
    e.stopPropagation();
    if (type === 'out') {
        const el = document.getElementById(nodeId);
        drawingEdge = { sourceNodeId: nodeId };
        drawingEdge.startX = el.offsetLeft + el.offsetWidth;
        drawingEdge.startY = el.offsetTop + el.offsetHeight / 2;
        tempEdgeEl.style.display = 'block';
        updateTempEdge(drawingEdge.startX, drawingEdge.startY);
    }
}

function onPortMouseUp(e, nodeId, type) {
    e.stopPropagation();
    if (drawingEdge && type === 'in' && drawingEdge.sourceNodeId !== nodeId) {
        const exists = edges.some(edge => edge.source === drawingEdge.sourceNodeId && edge.target === nodeId);
        if (!exists) {
            edges.push({ id: 'e' + Date.now(), source: drawingEdge.sourceNodeId, target: nodeId });
        }
        clearDrawing();
        renderEdges();
        if (activeNodeId === nodeId) openConfig(nodeId);
    }
}

function clearDrawing() {
    drawingEdge = null;
    tempEdgeEl.style.display = 'none';
}

function updateTempEdge(x, y) {
    if (drawingEdge) {
        tempEdgeEl.setAttribute('d', getBezierPath(drawingEdge.startX, drawingEdge.startY, x, y));
    }
}

document.addEventListener('mousemove', (e) => {
    if (draggingNodeId) {
        const rect = canvasEl.getBoundingClientRect();
        const node = nodes.find(item => item.id === draggingNodeId);
        node.x = Math.max(0, e.clientX - rect.left - dragOffset.x);
        node.y = Math.max(0, e.clientY - rect.top - dragOffset.y);

        const el = document.getElementById(draggingNodeId);
        el.style.left = node.x + 'px';
        el.style.top = node.y + 'px';
        renderEdges();
    } else if (drawingEdge) {
        const rect = canvasEl.getBoundingClientRect();
        updateTempEdge(e.clientX - rect.left, e.clientY - rect.top);
    }
});

document.addEventListener('mouseup', () => {
    if (draggingNodeId) draggingNodeId = null;
    if (drawingEdge) clearDrawing();
});

function onDrop(e) {
    e.preventDefault();
    const processorType = e.dataTransfer.getData('processorType');
    if (!processorType) return;

    if (processorType === 'system.start' && nodes.some(node => getNodeProcessorType(node) === 'system.start')) {
        alert('画布中只能保留一个开始节点');
        return;
    }

    if (processorType === 'system.end' && nodes.some(node => getNodeProcessorType(node) === 'system.end')) {
        alert('画布中只能保留一个结束节点');
        return;
    }

    const def = PROCESSOR_REGISTRY[processorType];
    if (!def) return;

    const rect = canvasEl.getBoundingClientRect();
    const x = Math.max(0, e.clientX - rect.left - 100);
    const y = Math.max(0, e.clientY - rect.top - 40);

    nodes.push({
        id: 'n' + Date.now(),
        processorType,
        x,
        y,
        config: def.createDefaultConfig ? def.createDefaultConfig() : {}
    });
    renderBoard();
}

function deleteNode(e, id) {
    e.stopPropagation();
    nodes = nodes.filter(node => node.id !== id);
    edges = edges.filter(edge => edge.source !== id && edge.target !== id);
    if (activeNodeId === id) closeConfig();
    renderBoard();
}

function openConfig(id) {
    const node = nodes.find(item => item.id === id);
    if (!node) return;
    const def = getNodeDef(node);
    if (!def) return;

    document.getElementById('config-title').innerText = def.title + ' 参数配置';
    document.getElementById('config-form').innerHTML = def.renderConfig ? def.renderConfig(node) : '<div class="empty-hint">当前节点类型无需配置</div>';
    document.getElementById('config-panel').classList.add('open');
}

function closeConfig() {
    activeNodeId = null;
    document.getElementById('config-panel').classList.remove('open');
    renderBoard();
}

function updateConfig(key, value) {
    const node = nodes.find(item => item.id === activeNodeId);
    if (!node) return;
    node.config[key] = value;
    renderBoard();
    openConfig(activeNodeId);
}

function updateCheckboxConfig(key, checked) {
    const node = nodes.find(item => item.id === activeNodeId);
    if (!node) return;
    node.config[key] = checked;
    renderBoard();
    openConfig(activeNodeId);
}

renderPaletteTabs();
initPalette();
renderBoard();
</script>
</body>
</html>
